<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyTrack — University Preference Manager</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --accent: #5b4fff;
      --accent-light: #ede9ff;
      --accent-mid: #7c6fff;
      --surface: #ffffff;
      --surface-2: #f7f6ff;
      --border: #e8e5f5;
      --text: #1a1730;
      --text-2: #6b6888;
      --success: #059669;
      --danger: #dc2626;
      --gold: #d97706;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f3f1ff;
      background-image: radial-gradient(ellipse at 20% 0%, rgba(91,79,255,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 100%, rgba(91,79,255,0.05) 0%, transparent 50%);
      min-height: 100vh;
      color: var(--text);
    }

    h1,h2,h3,h4 { font-family: 'Bricolage Grotesque', sans-serif; }

    @media print {
      body { background: white !important; background-image: none !important; }
      .print-hidden { display: none !important; }
      .print-card {
        box-shadow: none !important;
        border: 1px solid #e2e8f0 !important;
        border-radius: 12px !important;
        break-inside: avoid;
        margin-bottom: 16px;
      }
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c4bfed; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    .glass {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .card:hover { border-color: #c5bef5; box-shadow: 0 8px 32px rgba(91,79,255,0.08); }

    .input-field {
      width: 100%;
      padding: 13px 16px;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: all 0.18s;
    }
    .input-field:focus {
      background: white;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91,79,255,0.12);
    }
    .input-field::placeholder { color: #b0adc8; font-weight: 400; }

    select.input-field { cursor: pointer; }

    .label {
      display: block;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-2);
      margin-bottom: 8px;
      font-family: 'Bricolage Grotesque', sans-serif;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 700;
      border-radius: 12px;
      padding: 13px 24px;
      cursor: pointer;
      border: none;
      transition: all 0.18s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    .btn-primary:hover { background: var(--accent-mid); box-shadow: 0 4px 16px rgba(91,79,255,0.3); transform: translateY(-1px); }
    .btn-primary:active { transform: scale(0.97); }

    .btn-ghost {
      background: white;
      color: var(--text-2);
      font-weight: 600;
      border-radius: 12px;
      padding: 10px 18px;
      cursor: pointer;
      border: 1.5px solid var(--border);
      transition: all 0.18s;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

    .btn-green {
      background: #d1fae5;
      color: #059669;
      font-weight: 700;
      border-radius: 12px;
      padding: 10px 18px;
      cursor: pointer;
      border: 1.5px solid #6ee7b7;
      transition: all 0.18s;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-green:hover { background: #059669; color: white; border-color: #059669; }

    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(91,79,255,0.25);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .rank-badge {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 800;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 8px;
    }

    .rank-num { background: #fff8e6; color: var(--gold); border: 1px solid #fde68a; }
    .rank-na  { background: #f3f4f6; color: #9ca3af; border: 1px solid #e5e7eb; }

    .icon-btn {
      width: 34px; height: 34px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: white;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.18s;
      color: var(--text-2);
    }
    .icon-btn:hover { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
    .icon-btn.danger:hover { border-color: #fca5a5; background: #fff1f2; color: var(--danger); }
    .icon-btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

    .univ-clear-btn {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      width: 22px; height: 22px;
      border-radius: 50%;
      background: #e0dcf5;
      border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text-2);
    }
    .univ-clear-btn:hover { background: var(--accent); color: white; }

    .toast-enter { animation: toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both; }
    @keyframes toastIn {
      from { opacity: 0; transform: translate(-50%, -20px) scale(0.9); }
      to   { opacity: 1; transform: translate(-50%, 0) scale(1); }
    }

    .prog-card-enter { animation: cardIn 0.35s cubic-bezier(0.34,1.26,0.64,1) both; }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .suggestion-item {
      padding: 10px 16px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer;
      transition: background 0.12s;
      border-bottom: 1px solid #f5f3ff;
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover { background: var(--surface-2); }

    .num-badge {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 800;
      width: 44px; height: 44px;
      border-radius: 14px;
      background: var(--accent);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(91,79,255,0.3);
    }

    /* QS banner */
    .qs-banner {
      background: linear-gradient(135deg, #eef2ff 0%, #ede9ff 100%);
      border: 1.5px solid #c7d2fe;
      border-radius: 16px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }
    .qs-banner-icon {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: white;
      border: 1px solid #c7d2fe;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 20px;
    }

    /* Guide modal steps */
    .step-row {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .step-row:last-child { border-bottom: none; }
    .step-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 800;
      font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ─── Helpers ─────────────────────────────────────────────────────── */
    const parseRank = (rank) => {
      if (!rank || rank.toString().toUpperCase() === 'N/A') return Infinity;
      const match = rank.toString().match(/\d+/);
      return match ? parseInt(match[0], 10) : Infinity;
    };

    function useDebounce(value, delay) {
      const [dv, setDv] = useState(value);
      useEffect(() => {
        const h = setTimeout(() => setDv(value), delay);
        return () => clearTimeout(h);
      }, [value, delay]);
      return dv;
    }

    let _univCache = null;

    /* ─── QS CSV Lookup ───────────────────────────────────────────────── */
    // qsDb: { "university name lowercase": "rank" }
    // This is loaded from user-uploaded CSV

    const parseQSCsv = (text) => {
      const lines = text.split('\n').filter(l => l.trim());
      if (lines.length < 2) return {};
      const header = lines[0].toLowerCase();

      // Try to find name and rank columns
      // Common QS CSV formats:
      // "Institution","2025 Rank"  OR  "University","Rank"  OR  "institution_name","rank"
      const cols = lines[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g,'').trim().toLowerCase());
      
      let nameIdx = -1, rankIdx = -1;
      cols.forEach((c, i) => {
        if (nameIdx === -1 && (c.includes('institution') || c.includes('university') || c.includes('name'))) nameIdx = i;
        if (rankIdx === -1 && (c.includes('rank') || c === '#' || c === 'rank_display' || c === '2025' || c === '2026')) rankIdx = i;
      });

      // Fallback: rank is col 0, name is col 1 (common QS format)
      if (nameIdx === -1) nameIdx = 1;
      if (rankIdx === -1) rankIdx = 0;

      const db = {};
      for (let i = 1; i < lines.length; i++) {
        const row = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        if (row.length <= Math.max(nameIdx, rankIdx)) continue;
        const clean = s => (s || '').replace(/^"|"$/g,'').trim();
        const name = clean(row[nameIdx]).toLowerCase();
        let rank = clean(row[rankIdx]);
        if (!name) continue;
        // Keep range ranks like "401-410" as-is
        db[name] = rank || 'N/A';
      }
      return db;
    };

    const lookupRank = (qsDb, univName) => {
      if (!qsDb || !univName) return null;
      const q = univName.toLowerCase().trim();
      // Exact match
      if (qsDb[q]) return qsDb[q];
      // Partial match — find the closest key that includes our query or vice versa
      for (const key of Object.keys(qsDb)) {
        if (key.includes(q) || q.includes(key)) return qsDb[key];
      }
      return null;
    };

    /* ─── App ─────────────────────────────────────────────────────────── */
    const App = () => {
      const [preferences, setPreferences] = useState(() => {
        try {
          const saved = localStorage.getItem('studyTrackerV7');
          return saved ? JSON.parse(saved) : [];
        } catch {
          localStorage.removeItem('studyTrackerV7');
          return [];
        }
      });

      // QS database loaded from CSV
      const [qsDb, setQsDb] = useState(() => {
        try {
          const saved = localStorage.getItem('studyTracker_qsDb');
          return saved ? JSON.parse(saved) : null;
        } catch { return null; }
      });
      const [qsDbMeta, setQsDbMeta] = useState(() => {
        try {
          const saved = localStorage.getItem('studyTracker_qsMeta');
          return saved ? JSON.parse(saved) : null;
        } catch { return null; }
      });

      const defaultForm = {
        degreeType: 'Bachelor',
        universityName: '',
        qsRanking: '',
        cityState: '',
        country: '',
        programName: '',
        duration: '4 Years',
        language: 'English',
        customLanguage: '',
        logoUrl: ''
      };

      const [formData, setFormData] = useState(defaultForm);
      const [editingId,    setEditingId]    = useState(null);
      const [editFormData, setEditFormData] = useState({});
      const [showSyncModal,setShowSyncModal] = useState(false);
      const [syncLink,     setSyncLink]     = useState('');
      const [toast,        setToast]        = useState(null);
      const [suggestions,  setSuggestions]  = useState([]);
      const [isSearchingUniv, setIsSearchingUniv] = useState(false);
      const [showSuggestions, setShowSuggestions] = useState(false);
      const [showGuide,       setShowGuide]       = useState(false);

      const suggestionRef  = useRef(null);
      const fileInputRef   = useRef(null);
      const qsCsvInputRef  = useRef(null);
      const debouncedSearch = useDebounce(formData.universityName, 500);

      /* Auto-save preferences */
      useEffect(() => {
        localStorage.setItem('studyTrackerV7', JSON.stringify(preferences));
      }, [preferences]);

      /* Cloud Sync Restore */
      useEffect(() => {
        const params   = new URLSearchParams(window.location.search);
        const syncData = params.get('s');
        if (syncData) {
          try {
            const decoded = JSON.parse(LZString.decompressFromEncodedURIComponent(syncData));
            if (Array.isArray(decoded)) {
              setPreferences(decoded);
              showToast('✅ Data restored from Cloud Link!');
              window.history.replaceState(null, '', window.location.pathname);
            }
          } catch {
            showToast('❌ Invalid or corrupted sync link.', 'error');
          }
        }
      }, []);

      /* Close suggestions on outside click */
      useEffect(() => {
        const handler = (e) => {
          if (suggestionRef.current && !suggestionRef.current.contains(e.target))
            setShowSuggestions(false);
        };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      /* University global search */
      useEffect(() => {
        if (!debouncedSearch || debouncedSearch.length <= 2 || !showSuggestions) {
          setSuggestions([]); return;
        }
        const doSearch = (data) => {
          const term  = debouncedSearch.toLowerCase();
          const hits  = data.filter(u => u.name.toLowerCase().includes(term));
          const unique = Array.from(new Set(hits.map(a => a.name)))
            .map(name => hits.find(a => a.name === name))
            .slice(0, 7);
          setSuggestions(unique);
          setIsSearchingUniv(false);
        };
        if (_univCache) { doSearch(_univCache); return; }
        setIsSearchingUniv(true);
        fetch('https://raw.githubusercontent.com/Hipo/university-domains-list/master/world_universities_and_domains.json')
          .then(r => r.json())
          .then(data => { _univCache = data; doSearch(data); })
          .catch(err => { console.error(err); setIsSearchingUniv(false); });
      }, [debouncedSearch, showSuggestions]);

      /* ── QS CSV Upload ─────────────────────────────────────────────── */
      const handleQSCsvUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          const db = parseQSCsv(evt.target.result);
          const count = Object.keys(db).length;
          if (count === 0) {
            showToast('❌ Could not read QS data. Check CSV format.', 'error');
            return;
          }
          setQsDb(db);
          const meta = { fileName: file.name, count, loadedAt: new Date().toLocaleDateString() };
          setQsDbMeta(meta);
          localStorage.setItem('studyTracker_qsDb', JSON.stringify(db));
          localStorage.setItem('studyTracker_qsMeta', JSON.stringify(meta));
          showToast(`✅ QS Database loaded! ${count} universities found.`);
        };
        reader.readAsText(file);
        e.target.value = null;
      };

      const clearQsDb = () => {
        setQsDb(null);
        setQsDbMeta(null);
        localStorage.removeItem('studyTracker_qsDb');
        localStorage.removeItem('studyTracker_qsMeta');
        showToast('QS database cleared.', 'warn');
      };

      /* ── Helpers ───────────────────────────────────────────────────── */
      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 4000);
      };

      const extractDomain = (url) => {
        if (!url) return null;
        try { return new URL(url).hostname.replace('www.', ''); } catch { return null; }
      };

      const sortByRank = (list) =>
        [...list].sort((a, b) => parseRank(a.qsRanking) - parseRank(b.qsRanking));

      /* Form handlers */
      const handleAddInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
        if (name === 'universityName') setShowSuggestions(true);
      };

      const selectSuggestion = (univ) => {
        const domain = univ.web_pages?.[0] ? extractDomain(univ.web_pages[0]) : null;
        // QS lookup from uploaded CSV
        const rank = lookupRank(qsDb, univ.name);
        setFormData(prev => ({
          ...prev,
          universityName: univ.name,
          country:   univ.country || '',
          cityState: univ['state-province'] || '',
          qsRanking: rank || '',
          logoUrl:   domain ? `https://logo.clearbit.com/${domain}` : ''
        }));
        setShowSuggestions(false);
        if (rank) {
          showToast(`✅ QS Rank found: ${rank}`);
        } else if (qsDb) {
          showToast('Rank not found in QS database. You can enter it manually.', 'warn');
        } else {
          showToast('No QS database loaded. Upload a QS CSV for auto-rank.', 'warn');
        }
      };

      const handleAddProgram = (e) => {
        e.preventDefault();
        if (!formData.universityName || !formData.programName) return;

        const finalLang = formData.language === 'Others'
          ? (formData.customLanguage || 'Not Specified')
          : formData.language;

        const newPref = {
          id:             Date.now().toString(),
          degreeType:     formData.degreeType,
          universityName: formData.universityName,
          qsRanking:      formData.qsRanking || 'N/A',
          cityState:      formData.cityState,
          country:        formData.country,
          programName:    formData.programName,
          duration:       formData.duration,
          language:       finalLang,
          logoUrl:        formData.logoUrl
        };

        setPreferences(sortByRank([...preferences, newPref]));
        setFormData(prev => ({ ...prev, programName: '' }));
        showToast('✅ Program added!');
      };

      const clearUniversityFields = () => {
        setFormData(prev => ({
          ...prev,
          universityName: '',
          qsRanking: '',
          cityState: '',
          country: '',
          logoUrl: ''
        }));
        setSuggestions([]);
      };

      /* Edit / Delete */
      const STANDARD_LANGS = ['English', 'Arabic', 'Bilingual (Ar+En)'];

      const startEditing = (pref) => {
        setEditingId(pref.id);
        const isStd = STANDARD_LANGS.includes(pref.language);
        setEditFormData({
          ...pref,
          language:       isStd ? pref.language : 'Others',
          customLanguage: isStd ? '' : pref.language
        });
      };

      const saveEdit = () => {
        const finalLang = editFormData.language === 'Others'
          ? (editFormData.customLanguage || 'Not Specified')
          : editFormData.language;
        const updated = preferences.map(p =>
          p.id === editingId ? { ...editFormData, language: finalLang } : p
        );
        setPreferences(sortByRank(updated));
        setEditingId(null);
        showToast('Changes saved successfully.');
      };

      const handleDelete = (id) => {
        if (confirm('Remove this program from your list?'))
          setPreferences(preferences.filter(p => p.id !== id));
      };

      const movePreference = (index, direction) => {
        const arr = [...preferences];
        if (direction === 'up' && index > 0)
          [arr[index - 1], arr[index]] = [arr[index], arr[index - 1]];
        else if (direction === 'down' && index < arr.length - 1)
          [arr[index + 1], arr[index]] = [arr[index], arr[index + 1]];
        setPreferences(arr);
      };

      const handleSortClick = () => {
        setPreferences(sortByRank(preferences));
        showToast('List sorted by QS Ranking.');
      };

      /* Cloud sync */
      const [isShortening, setIsShortening] = useState(false);

      const generateCloudLink = async () => {
        const compressed = LZString.compressToEncodedURIComponent(JSON.stringify(preferences));
        const longUrl = `${window.location.origin}${window.location.pathname}?s=${compressed}`;
        setSyncLink('');
        setIsShortening(true);
        try {
          const res = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(longUrl)}`);
          if (!res.ok) throw new Error('TinyURL failed');
          const short = await res.text();
          setSyncLink(short.trim());
        } catch {
          setSyncLink(longUrl);
          showToast('Could not shorten link, showing full URL.', 'warn');
        } finally {
          setIsShortening(false);
        }
      };

      /* CSV Export */
      const handleExportCSV = () => {
        const headers = ['Rank','Degree','University Name','QS World Ranking','City/State','Country','Program Name','Duration','Language'];
        const rows = preferences.map((p, i) => [
          i + 1, p.degreeType,
          `"${p.universityName.replace(/"/g,'""')}"`,
          p.qsRanking,
          `"${(p.cityState || '').replace(/"/g,'""')}"`,
          `"${(p.country || '').replace(/"/g,'""')}"`,
          `"${p.programName.replace(/"/g,'""')}"`,
          p.duration, p.language
        ].join(','));
        const csv  = '\uFEFF' + [headers.join(','), ...rows].join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'StudyTrack_Programs.csv';
        link.click();
      };

      /* Programs CSV Import */
      const handleImportCSV = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          const lines = evt.target.result.split('\n').filter(l => l.trim());
          if (lines.length < 2) return showToast('Invalid or empty CSV file.', 'error');
          const imported = [];
          for (let i = 1; i < lines.length; i++) {
            const row = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            if (row.length >= 7) {
              const c = (s) => s ? s.replace(/^"|"$/g, '').trim() : '';
              imported.push({
                id:             Date.now().toString() + i,
                degreeType:     c(row[1]) || 'Bachelor',
                universityName: c(row[2]) || '',
                qsRanking:      c(row[3]) || 'N/A',
                cityState:      c(row[4]) || '',
                country:        c(row[5]) || '',
                programName:    c(row[6]) || '',
                duration:       c(row[7]) || '',
                language:       c(row[8]) || '',
                logoUrl:        ''
              });
            }
          }
          setPreferences(sortByRank([...preferences, ...imported]));
          showToast(`✅ ${imported.length} programs imported!`);
          e.target.value = null;
        };
        reader.readAsText(file);
      };

        success: { bg: '#1a1730', border: '#2d2550', text: 'white' },

        warn:    { bg: '#fffbeb', border: '#fde68a', text: '#92400e' }

                              </button>
                              <button className="icon-btn" onClick={() => movePreference(index, 'down')} disabled={index === preferences.length - 1} title="Move Down">
                                <svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 9l-7 7-7-7"/>
                                </svg>
                              </button>
                            </div>
                            <button className="icon-btn" onClick={() => startEditing(pref)} title="Edit">
                              <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                              </svg>
                            </button>
                            <button className="icon-btn danger" onClick={() => handleDelete(pref.id)} title="Delete">
                              <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                              </svg>
                            </button>
                          </div>
                        </div>
                      </div>
                    ) : (
                      /* ── Edit mode ── */
                      <div style={{ flex: 1 }}>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px', marginBottom: '12px' }}>
                          <input type="text" value={editFormData.universityName}
                            onChange={e => setEditFormData({...editFormData, universityName: e.target.value})}
                            className="input-field" style={{ gridColumn: '1/-1' }} placeholder="University Name"/>
                          <input type="text" value={editFormData.programName}
                            onChange={e => setEditFormData({...editFormData, programName: e.target.value})}
                            className="input-field" style={{ gridColumn: '1/-1' }} placeholder="Program Title"/>
                          <select value={editFormData.degreeType}
                            onChange={e => setEditFormData({...editFormData, degreeType: e.target.value})}
                            className="input-field">
                            <option>Bachelor</option><option>Master's</option><option>PhD</option>
                          </select>
                          <input type="text" value={editFormData.qsRanking}
                            onChange={e => setEditFormData({...editFormData, qsRanking: e.target.value})}
                            className="input-field" placeholder="QS Rank"/>
                          <input type="text" value={editFormData.cityState}
                            onChange={e => setEditFormData({...editFormData, cityState: e.target.value})}
                            className="input-field" placeholder="City/State"/>
                          <input type="text" value={editFormData.country}
                            onChange={e => setEditFormData({...editFormData, country: e.target.value})}
                            className="input-field" placeholder="Country"/>
                          <select value={editFormData.duration}
                            onChange={e => setEditFormData({...editFormData, duration: e.target.value})}
                            className="input-field">
                            {[1,2,3,4,5].map(y => (
                              <option key={y} value={`${y} Year${y>1?'s':''}`}>{y} Year{y>1?'s':''}</option>
                            ))}
                          </select>
                          <select value={editFormData.language}
                            onChange={e => setEditFormData({...editFormData, language: e.target.value})}
                            className="input-field">
                            <option>English</option><option>Arabic</option>
                            <option>Bilingual (Ar+En)</option>
                            <option value="Others">Others…</option>
                          </select>
                          {editFormData.language === 'Others' && (
                            <input type="text" value={editFormData.customLanguage || ''}
                              onChange={e => setEditFormData({...editFormData, customLanguage: e.target.value})}
                              className="input-field" style={{ gridColumn: '1/-1' }} placeholder="Specify language…"/>
                          )}
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'flex-end', gap: '8px' }}>
                          <button onClick={() => setEditingId(null)} className="btn-ghost">Cancel</button>
                          <button onClick={saveEdit} className="btn-primary" style={{ padding: '10px 20px', fontSize: '13px' }}>Save</button>
                        </div>
                      </div>
                    )}
                  </div>
                ))
              )}
            </div>
          </main>

          {/* ── Cloud Sync Modal ─────────────────────────────────────── */}
          {showSyncModal && (
            <div style={{
              position: 'fixed', inset: 0,
              background: 'rgba(26,23,48,0.5)',
              backdropFilter: 'blur(12px)',
              zIndex: 9998,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              padding: '20px'
            }}>
              <div style={{
                background: 'white', borderRadius: '24px', padding: '32px',
                maxWidth: '420px', width: '100%',
                boxShadow: '0 24px 80px rgba(91,79,255,0.25)',
                position: 'relative'
              }}>
                <button
                  onClick={() => setShowSyncModal(false)}
                  style={{
                    position: 'absolute', top: '16px', right: '16px',
                    width: 32, height: 32, borderRadius: '10px',
                    border: '1px solid var(--border)', background: 'white',
                    cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
                    color: 'var(--text-2)'
                  }}>
                  <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M6 18L18 6M6 6l12 12"/>
                  </svg>
                </button>
                <h3 style={{ fontFamily: 'Bricolage Grotesque', fontWeight: 800, fontSize: '20px', marginBottom: '6px', color: 'var(--text)' }}>
                  Cloud Sync Link
                </h3>
                <p style={{ fontSize: '12.5px', color: 'var(--text-2)', marginBottom: '16px' }}>
                  Share this link to restore your list on any device.
                </p>
                <div style={{
                  background: 'var(--surface-2)', padding: '16px', borderRadius: '14px',
                  border: '1.5px solid var(--border)', marginBottom: '16px',
                  display: 'flex', alignItems: 'center', gap: '10px', minHeight: '56px'
                }}>
                  {isShortening ? (
                    <>
                      <div className="spinner"></div>
                      <span style={{ fontSize: '13px', color: 'var(--text-2)' }}>Shortening link…</span>
                    </>
                  ) : (
                    <span style={{ color: 'var(--accent)', fontWeight: 700, fontSize: '15px', wordBreak: 'break-all' }}>
                      {syncLink}
                    </span>
                  )}
                </div>
                <button
                  onClick={() => { navigator.clipboard.writeText(syncLink); showToast('✅ Link copied!'); }}
                  disabled={isShortening || !syncLink}
                  className="btn-primary" style={{ width: '100%', justifyContent: 'center', opacity: (isShortening || !syncLink) ? 0.5 : 1 }}>
                  <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                  </svg>
                  Copy Short Link
                </button>
              </div>
            </div>
          )}

          {/* ── QS CSV Guide Modal ──────────────────────────────────── */}
          {showGuide && (
            <div style={{
              position: 'fixed', inset: 0,
              background: 'rgba(26,23,48,0.6)',
              backdropFilter: 'blur(14px)',
              zIndex: 9998,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              padding: '20px', overflowY: 'auto'
            }}>
              <div style={{
                background: 'white', borderRadius: '24px', padding: '32px',
                maxWidth: '480px', width: '100%',
                boxShadow: '0 24px 80px rgba(91,79,255,0.25)',
                position: 'relative', maxHeight: '90vh', overflowY: 'auto'
              }}>
                <button
                  onClick={() => setShowGuide(false)}
                  style={{
                    position: 'absolute', top: '16px', right: '16px',
                    width: 32, height: 32, borderRadius: '10px',
                    border: '1px solid var(--border)', background: 'white',
                    cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
                    color: 'var(--text-2)'
                  }}>
                  <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M6 18L18 6M6 6l12 12"/>
                  </svg>
                </button>

                <div style={{ fontSize: '28px', marginBottom: '8px' }}>📊</div>
                <h3 style={{ fontFamily: 'Bricolage Grotesque', fontWeight: 800, fontSize: '20px', marginBottom: '4px', color: 'var(--text)' }}>
                  How to Get QS Rankings CSV
                </h3>
                <p style={{ fontSize: '12.5px', color: 'var(--text-2)', marginBottom: '20px' }}>
                  একবার download করলে প্রতি বছর নতুন file upload করলেই সব rank update হবে।
                </p>

                <div>
                  <div className="step-row">
                    <div className="step-num">1</div>
                    <div>
                      <div style={{ fontWeight: 700, fontSize: '14px', color: 'var(--text)', marginBottom: '4px' }}>
                        topuniversities.com এ যাও
                      </div>
                      <div style={{ fontSize: '12.5px', color: 'var(--text-2)', lineHeight: '1.5' }}>
                        Browser এ এই লিংক খোলো:
                      </div>
                      <a href="https://www.topuniversities.com/world-university-rankings" target="_blank"
                        style={{ fontSize: '12px', color: 'var(--accent)', fontWeight: 600, wordBreak: 'break-all' }}>
                        topuniversities.com/world-university-rankings
                      </a>
                    </div>
                  </div>

                  <div className="step-row">
                    <div className="step-num">2</div>
                    <div>
                      <div style={{ fontWeight: 700, fontSize: '14px', color: 'var(--text)', marginBottom: '4px' }}>
                        "Download Data" বাটন খোঁজো
                      </div>
                      <div style={{ fontSize: '12.5px', color: 'var(--text-2)', lineHeight: '1.5' }}>
                        Rankings table এর উপরে বা নিচে <strong>"Download"</strong> বা <strong>"Export CSV"</strong> বাটন থাকে। সেটায় ক্লিক করো।
                        <br/><br/>
                        ⚠️ Free account লাগতে পারে — register করো (free)।
                      </div>
                    </div>
                  </div>

                  <div className="step-row">
                    <div className="step-num">3</div>
                    <div>
                      <div style={{ fontWeight: 700, fontSize: '14px', color: 'var(--text)', marginBottom: '4px' }}>
                        CSV file save করো
                      </div>
                      <div style={{ fontSize: '12.5px', color: 'var(--text-2)', lineHeight: '1.5' }}>
                        Download হওয়া file টা তোমার Phone বা PC তে save করো। যেকোনো folder এ রাখতে পারো।
                      </div>
                    </div>
                  </div>

                  <div className="step-row">
                    <div className="step-num">4</div>
                    <div>
                      <div style={{ fontWeight: 700, fontSize: '14px', color: 'var(--text)', marginBottom: '4px' }}>
                        এই app এ Upload করো
                      </div>
                      <div style={{ fontSize: '12.5px', color: 'var(--text-2)', lineHeight: '1.5' }}>
                        Banner এ <strong>"⬆ Upload CSV"</strong> button এ click করো। File select করলেই automatically সব university র rank load হবে।
                        <br/><br/>
                        এরপর থেকে যেকোনো university search করলে rank <strong>automatically</strong> fill হয়ে যাবে!
                      </div>
                    </div>
                  </div>

                  <div className="step-row" style={{ background: '#f0fdf4', borderRadius: '12px', padding: '14px', margin: '4px 0', border: '1px solid #bbf7d0' }}>
                    <div style={{ fontSize: '20px' }}>🔄</div>
                    <div>
                      <div style={{ fontWeight: 700, fontSize: '13px', color: '#065f46', marginBottom: '4px' }}>
                        প্রতি বছর update করতে
                      </div>
                      <div style={{ fontSize: '12px', color: '#059669', lineHeight: '1.5' }}>
                        New QS rankings আসলে শুধু নতুন CSV download করে আবার upload করো। আগের সব data আপনাআপনি update হয়ে যাবে।
                      </div>
                    </div>
                  </div>
                </div>

                <div style={{ marginTop: '20px', display: 'flex', gap: '10px' }}>
                  <button onClick={() => setShowGuide(false)} className="btn-ghost" style={{ flex: 1, justifyContent: 'center' }}>
                    Close
                  </button>
                  <label htmlFor="qs-csv-input" onClick={() => setShowGuide(false)}
                    style={{ flex: 1, justifyContent: 'center', display: 'inline-flex', alignItems: 'center', gap: '8px' }}
                    className="btn-primary">
                    ⬆ Upload CSV Now
                  </label>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
