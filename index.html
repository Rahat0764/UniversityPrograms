<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Study Tracker</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    /* Print Styles */
    @media print {
      body { background-color: white !important; }
      .print-hidden { display: none !important; }
      .print-card { box-shadow: none !important; border-bottom: 1px solid #e2e8f0 !important; border-radius: 0 !important; break-inside: avoid; }
      .print-bg-transparent { background-color: transparent !important; }
    }
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-indigo-100 selection:text-indigo-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const App = () => {
      // LocalStorage data load
      const [preferences, setPreferences] = useState(() => {
        const savedData = localStorage.getItem('universalStudyTracker');
        return savedData ? JSON.parse(savedData) : [];
      });

      const [formData, setFormData] = useState({
        universityName: '',
        qsRanking: '',
        programName: '',
        duration: '4 Years',
        language: 'English',
      });

      // Save to LocalStorage on change
      useEffect(() => {
        localStorage.setItem('universalStudyTracker', JSON.stringify(preferences));
      }, [preferences]);

      const handleInputChange = (e) => {
        setFormData({ ...formData, [e.target.name]: e.target.value });
      };

      const handleAddProgram = (e) => {
        e.preventDefault();
        
        if (!formData.universityName || !formData.programName) return;

        const newPreference = {
          id: Date.now().toString() + Math.random().toString(16).slice(2),
          ...formData
        };

        setPreferences([...preferences, newPreference]);

        // Reset form partially
        setFormData({ 
          ...formData, 
          programName: '', 
          qsRanking: '', 
          duration: '4 Years', 
          language: 'English' 
        });
      };

      const handleDelete = (id) => {
        setPreferences(preferences.filter(item => item.id !== id));
      };

      const movePreference = (index, direction) => {
        const newPreferences = [...preferences];
        if (direction === 'up' && index > 0) {
          [newPreferences[index - 1], newPreferences[index]] = [newPreferences[index], newPreferences[index - 1]];
        } else if (direction === 'down' && index < newPreferences.length - 1) {
          [newPreferences[index + 1], newPreferences[index]] = [newPreferences[index], newPreferences[index + 1]];
        }
        setPreferences(newPreferences);
      };

      const handlePrintPDF = () => {
        window.print();
      };

      const handleExportCSV = () => {
        // Headers
        const headers = ["Preference Rank", "University Name", "QS World Ranking", "Program Name", "Duration", "Language"];
        
        // Rows
        const csvRows = preferences.map((p, index) => [
          index + 1,
          `"${p.universityName.replace(/"/g, '""')}"`, // Handle commas in name
          p.qsRanking || "N/A",
          `"${p.programName.replace(/"/g, '""')}"`,
          p.duration,
          p.language
        ].join(","));

        // Combine
        const csvContent = [headers.join(","), ...csvRows].join("\n");
        
        // Download logic
        const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", "My_University_Preferences.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      return (
        <div className="min-h-screen pb-24">
          {/* Header */}
          <header className="bg-white/80 backdrop-blur-md shadow-sm border-b border-slate-200 sticky top-0 z-50 print-hidden">
            <div className="max-w-5xl mx-auto px-4 sm:px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
              <div className="flex items-center gap-2.5">
                <div className="bg-indigo-600 p-2 rounded-xl">
                  <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                </div>
                <h1 className="text-2xl font-extrabold text-slate-800 tracking-tight">Study<span className="text-indigo-600">Track</span></h1>
              </div>
              
              <div className="flex items-center gap-3 w-full sm:w-auto">
                <button 
                  onClick={handleExportCSV}
                  className="flex-1 sm:flex-none flex justify-center items-center gap-2 bg-emerald-50 text-emerald-700 hover:bg-emerald-100 border border-emerald-200 px-4 py-2.5 rounded-xl font-semibold transition-all active:scale-95 text-sm"
                >
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                  Export CSV
                </button>
                <button 
                  onClick={handlePrintPDF}
                  className="flex-1 sm:flex-none flex justify-center items-center gap-2 bg-slate-900 text-white hover:bg-slate-800 px-4 py-2.5 rounded-xl font-semibold transition-all active:scale-95 text-sm shadow-md shadow-slate-900/10"
                >
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
                  Save PDF
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-5xl mx-auto px-4 sm:px-6 py-8">
            
            {/* Title for Print */}
            <div className="hidden print:block mb-8 text-center border-b border-slate-200 pb-6">
              <h1 className="text-3xl font-bold text-slate-900">University Preference List</h1>
              <p className="text-slate-500 mt-1 font-medium">My Target Programs for Higher Study</p>
            </div>

            {/* --- Form Section --- */}
            <div className="bg-white p-6 sm:p-8 rounded-3xl shadow-xl shadow-slate-200/40 border border-slate-100 mb-10 print-hidden">
              <div className="flex items-center gap-3 mb-6">
                <div className="bg-indigo-50 p-2.5 rounded-xl border border-indigo-100">
                  <svg className="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
                </div>
                <div>
                  <h2 className="text-xl font-bold text-slate-800">Add to Preference List</h2>
                  <p className="text-sm text-slate-500 font-medium">Fill the details to add a new university program</p>
                </div>
              </div>

              <form onSubmit={handleAddProgram} className="grid grid-cols-1 md:grid-cols-12 gap-5">
                
                <div className="md:col-span-8">
                  <label className="block text-sm font-semibold text-slate-700 mb-1.5">University Name <span className="text-red-500">*</span></label>
                  <input type="text" name="universityName" value={formData.universityName} onChange={handleInputChange} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400 font-medium" placeholder="e.g. Harvard University" required />
                </div>
                
                <div className="md:col-span-4">
                  <label className="block text-sm font-semibold text-slate-700 mb-1.5">QS World Rank</label>
                  <input type="number" name="qsRanking" value={formData.qsRanking} onChange={handleInputChange} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400 font-medium" placeholder="e.g. 1" />
                </div>

                <div className="md:col-span-6">
                  <label className="block text-sm font-semibold text-slate-700 mb-1.5">Program Name <span className="text-red-500">*</span></label>
                  <input type="text" name="programName" value={formData.programName} onChange={handleInputChange} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400 font-medium" placeholder="e.g. BSc in Computer Science" required />
                </div>

                <div className="md:col-span-3">
                  <label className="block text-sm font-semibold text-slate-700 mb-1.5">Duration</label>
                  <select name="duration" value={formData.duration} onChange={handleInputChange} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all cursor-pointer font-medium appearance-none">
                    <option value="1 Year">1 Year</option>
                    <option value="2 Years">2 Years</option>
                    <option value="3 Years">3 Years</option>
                    <option value="4 Years">4 Years</option>
                    <option value="5 Years">5 Years</option>
                  </select>
                </div>

                <div className="md:col-span-3">
                  <label className="block text-sm font-semibold text-slate-700 mb-1.5">Language</label>
                  <select name="language" value={formData.language} onChange={handleInputChange} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all cursor-pointer font-medium appearance-none">
                    <option value="English">English</option>
                    <option value="Arabic">Arabic</option>
                    <option value="Bilingual (Ar+En)">Bilingual (Ar+En)</option>
                    <option value="Other">Other</option>
                  </select>
                </div>

                <div className="md:col-span-12 mt-2">
                  <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-indigo-600/20 flex justify-center items-center gap-2 active:scale-[0.98]">
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 4v16m8-8H4"/></svg>
                    Add to Preference List
                  </button>
                </div>
              </form>
            </div>

            {/* --- List Section --- */}
            <div className="space-y-4">
              {preferences.length === 0 ? (
                <div className="text-center py-20 bg-white rounded-3xl border border-dashed border-slate-300 print-hidden">
                  <div className="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg className="w-10 h-10 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                  </div>
                  <h3 className="text-xl font-bold text-slate-800">List is Empty</h3>
                  <p className="text-slate-500 mt-2 font-medium">Start adding your preferred university programs above.</p>
                </div>
              ) : (
                preferences.map((pref, index) => (
                  <div key={pref.id} className="print-card relative bg-white p-5 sm:p-6 rounded-2xl shadow-lg shadow-slate-200/30 border border-slate-100 flex flex-col sm:flex-row gap-5 items-start sm:items-center group transition-all hover:border-indigo-200">
                    
                    {/* Rank Badge */}
                    <div className="absolute -top-3 -left-3 sm:static sm:top-auto sm:left-auto flex-shrink-0 w-10 h-10 sm:w-14 sm:h-14 bg-gradient-to-br from-indigo-600 to-violet-700 text-white rounded-full sm:rounded-2xl flex items-center justify-center font-extrabold text-lg sm:text-2xl shadow-lg shadow-indigo-600/30 print-bg-transparent print:text-black print:border print:shadow-none">
                      #{index + 1}
                    </div>

                    {/* Content */}
                    <div className="flex-grow min-w-0 mt-3 sm:mt-0 w-full">
                      {pref.qsRanking && (
                        <div className="inline-flex items-center gap-1.5 mb-2 bg-amber-50 text-amber-700 px-2.5 py-1 rounded-md text-xs font-bold uppercase tracking-wider border border-amber-200/50">
                          <svg className="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                          QS Rank: {pref.qsRanking}
                        </div>
                      )}
                      
                      <h3 className="text-xl font-bold text-slate-800 break-words leading-tight mb-1">
                        {pref.programName}
                      </h3>
                      
                      <div className="flex flex-wrap items-center gap-2 text-slate-500 font-medium text-sm mb-3">
                        <span className="flex items-center gap-1.5 text-indigo-600 font-semibold">
                          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                          {pref.universityName}
                        </span>
                      </div>

                      <div className="flex flex-wrap items-center gap-3 text-sm text-slate-600">
                        <span className="flex items-center gap-1.5 bg-slate-100 px-3 py-1.5 rounded-lg font-medium">
                          <svg className="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                          {pref.duration}
                        </span>
                        <span className="flex items-center gap-1.5 bg-slate-100 px-3 py-1.5 rounded-lg font-medium">
                          <svg className="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/></svg>
                          {pref.language}
                        </span>
                      </div>
                    </div>

                    {/* Actions */}
                    <div className="flex sm:flex-col items-center justify-end gap-2 w-full sm:w-auto mt-4 sm:mt-0 print-hidden border-t sm:border-t-0 pt-4 sm:pt-0 border-slate-100">
                      <div className="flex gap-1 bg-slate-50 border border-slate-100 rounded-xl p-1">
                        <button 
                          onClick={() => movePreference(index, 'up')}
                          disabled={index === 0}
                          className={`p-2 rounded-lg transition-all ${index === 0 ? 'text-slate-300 cursor-not-allowed' : 'text-slate-600 hover:bg-white hover:text-indigo-600 hover:shadow-sm'}`}
                        >
                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 15l7-7 7 7"/></svg>
                        </button>
                        <button 
                          onClick={() => movePreference(index, 'down')}
                          disabled={index === preferences.length - 1}
                          className={`p-2 rounded-lg transition-all ${index === preferences.length - 1 ? 'text-slate-300 cursor-not-allowed' : 'text-slate-600 hover:bg-white hover:text-indigo-600 hover:shadow-sm'}`}
                        >
                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"/></svg>
                        </button>
                      </div>
                      
                      <button 
                        onClick={() => handleDelete(pref.id)}
                        className="ml-auto sm:ml-0 flex items-center justify-center w-10 h-10 text-rose-400 hover:text-rose-600 hover:bg-rose-50 rounded-xl transition-all"
                      >
                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                      </button>
                    </div>
                  </div>
                ))
              )}
            </div>
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
