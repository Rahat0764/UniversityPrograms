<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProgramsTracker — University Preference Manager</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <!-- HTML2PDF for direct PDF downloading -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --accent: #5b4fff;
      --accent-light: #ede9ff;
      --accent-mid: #7c6fff;
      --surface: #ffffff;
      --surface-2: #f7f6ff;
      --border: #e8e5f5;
      --text: #1a1730;
      --text-2: #6b6888;
      --success: #059669;
      --danger: #dc2626;
      --gold: #d97706;
      --bachelor-bg: #eff6ff;
      --bachelor-border: #bfdbfe;
      --bachelor-accent: #1d4ed8;
      --masters-bg: #fff1f2;
      --masters-border: #fecdd3;
      --masters-accent: #be185d;
      --phd-bg: #fffbeb;
      --phd-border: #fde68a;
      --phd-accent: #b45309;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f3f1ff;
      background-image: radial-gradient(ellipse at 20% 0%, rgba(91,79,255,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 100%, rgba(91,79,255,0.05) 0%, transparent 50%);
      min-height: 100vh;
      color: var(--text);
    }

    h1,h2,h3,h4 { font-family: 'Bricolage Grotesque', sans-serif; }

    /* Print & PDF Export Styles */
    @media print {
      body, html, #root { 
        height: auto !important; 
        min-height: auto !important; 
        background: white !important; 
        display: block !important;
      }
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color-adjust: exact !important;
      }
      main { display: block !important; padding: 0 !important; margin: 0 !important; max-width: 100% !important; }
      .print-hidden { display: none !important; }
      .print-flex-block { display: block !important; }
      .print-flex-block > div { margin-bottom: 16px !important; }
      .print-card {
        box-shadow: none !important;
        border: 1px solid #e2e8f0 !important;
        border-radius: 12px !important;
        page-break-inside: avoid;
        break-inside: avoid;
      }
    }

    /* Styles specifically for html2pdf rendering */
    .is-exporting-pdf {
      background: white !important;
      padding: 20px !important;
    }
    .is-exporting-pdf * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
    .is-exporting-pdf .print-hidden { display: none !important; }
    .is-exporting-pdf .hide-on-screen { display: block !important; }
    .is-exporting-pdf .print-flex-block { display: block !important; }
    .is-exporting-pdf .print-flex-block > div { margin-bottom: 16px !important; break-inside: avoid; page-break-inside: avoid; }
    .is-exporting-pdf .print-card { box-shadow: none !important; border: 1px solid #e2e8f0 !important; }

    /* Helper class to show header only during print/pdf */
    .hide-on-screen { display: none; }
    @media print { .hide-on-screen { display: block !important; } }

    .print-header {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: #1a1730;
      margin-bottom: 4px;
    }
    .print-subtitle {
      font-size: 13px;
      color: #6b6888;
      margin-bottom: 24px;
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c4bfed; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    .glass {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      transition: all 0.3s ease;
    }
    .card:hover { border-color: #c5bef5; box-shadow: 0 8px 32px rgba(91,79,255,0.08); }

    .card-bachelor { background: linear-gradient(135deg, #ffffff 0%, #f0f5ff 100%); border-color: var(--bachelor-border); }
    .card-bachelor:hover { border-color: #93c5fd; box-shadow: 0 8px 32px rgba(29,78,216,0.1); }
    .card-masters { background: linear-gradient(135deg, #ffffff 0%, #fff5f7 100%); border-color: var(--masters-border); }
    .card-masters:hover { border-color: #f9a8d4; box-shadow: 0 8px 32px rgba(190,24,93,0.1); }
    .card-phd { background: linear-gradient(135deg, #ffffff 0%, #fffdf0 100%); border-color: var(--phd-border); }
    .card-phd:hover { border-color: #fcd34d; box-shadow: 0 8px 32px rgba(180,83,9,0.1); }

    .input-field {
      width: 100%; padding: 13px 16px; background: var(--surface-2); border: 1.5px solid var(--border);
      border-radius: 12px; font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 14px;
      color: var(--text); outline: none; transition: all 0.25s ease;
    }
    .input-field:focus { background: white; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91,79,255,0.12); }
    .input-field::placeholder { color: #b0adc8; font-weight: 400; }
    select.input-field { cursor: pointer; }

    .label {
      display: block; font-size: 10.5px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-2); margin-bottom: 8px;
      font-family: 'Bricolage Grotesque', sans-serif;
    }

    .btn-primary {
      background: var(--accent); color: white; font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700;
      border-radius: 12px; padding: 13px 24px; cursor: pointer; border: none; transition: all 0.25s ease;
      display: inline-flex; align-items: center; gap: 8px; font-size: 14px;
    }
    .btn-primary:hover { background: var(--accent-mid); box-shadow: 0 4px 16px rgba(91,79,255,0.3); transform: translateY(-1px); }
    .btn-primary:active { transform: scale(0.97); }

    .btn-ghost {
      background: white; color: var(--text-2); font-weight: 600; border-radius: 12px; padding: 10px 18px;
      cursor: pointer; border: 1.5px solid var(--border); transition: all 0.25s ease;
      display: inline-flex; align-items: center; gap: 7px; font-size: 13px; font-family: 'DM Sans', sans-serif;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

    .btn-green {
      background: #ecfdf5; color: #059669; font-weight: 700; border-radius: 12px; padding: 10px 18px;
      cursor: pointer; border: 1.5px solid #a7f3d0; transition: all 0.25s ease;
      display: inline-flex; align-items: center; gap: 7px; font-size: 13px; font-family: 'DM Sans', sans-serif;
    }
    .btn-green:hover { background: #059669; color: white; border-color: #059669; }

    .btn-red {
      background: #fef2f2; color: #dc2626; font-weight: 700; border-radius: 12px; padding: 10px 18px;
      cursor: pointer; border: 1.5px solid #fecaca; transition: all 0.25s ease;
      display: inline-flex; align-items: center; gap: 7px; font-size: 13px; font-family: 'DM Sans', sans-serif;
    }
    .btn-red:hover { background: #dc2626; color: white; border-color: #dc2626; }

    .btn-blue {
      background: #eff6ff; color: #2563eb; font-weight: 700; border-radius: 12px; padding: 10px 18px;
      cursor: pointer; border: 1.5px solid #bfdbfe; transition: all 0.25s ease;
      display: inline-flex; align-items: center; gap: 7px; font-size: 13px; font-family: 'DM Sans', sans-serif;
    }
    .btn-blue:hover { background: #2563eb; color: white; border-color: #2563eb; }

    .spinner {
      width: 15px; height: 15px; border: 2px solid rgba(91,79,255,0.25); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .rank-badge { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 11px; padding: 3px 10px; border-radius: 8px; }
    .rank-num { background: #fff8e6; color: var(--gold); border: 1px solid #fde68a; }
    .rank-na  { background: #f3f4f6; color: #9ca3af; border: 1px solid #e5e7eb; }

    .icon-btn {
      width: 34px; height: 34px; border-radius: 10px; border: 1.5px solid var(--border); background: white;
      display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; color: var(--text-2);
    }
    .icon-btn:hover { border-color: var(--accent); background: var(--accent-light); color: var(--accent); transform: scale(1.05); }
    .icon-btn.danger:hover { border-color: #fca5a5; background: #fff1f2; color: var(--danger); }
    .icon-btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; transform: none; }

    .univ-clear-btn {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px;
      border-radius: 50%; background: #e0dcf5; border: none; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s ease; color: var(--text-2);
    }
    .univ-clear-btn:hover { background: var(--accent); color: white; transform: translateY(-50%) scale(1.1); }

    .toast-enter { animation: toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both; }
    @keyframes toastIn { from { opacity: 0; transform: translate(-50%, -20px) scale(0.9); } to { opacity: 1; transform: translate(-50%, 0) scale(1); } }

    .prog-card-enter { animation: cardIn 0.4s cubic-bezier(0.34,1.26,0.64,1) both; }
    @keyframes cardIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(26,23,48,0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      z-index: 9998; display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.2s ease-out both;
    }
    .modal-content {
      background: white; border-radius: 24px; padding: 32px; max-width: 420px; width: 100%;
      box-shadow: 0 24px 80px rgba(91,79,255,0.25); position: relative; animation: scaleUp 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleUp { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

    .fade-slide-enter { animation: fadeSlide 0.3s ease-out both; }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-10px); max-height: 0; margin-top: 0; overflow: hidden; }
      to { opacity: 1; transform: translateY(0); max-height: 100px; margin-top: 14px; overflow: visible; }
    }

    .suggestion-item {
      padding: 10px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.15s ease; border-bottom: 1px solid #f5f3ff;
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover { background: var(--surface-2); }

    .num-badge {
      font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; width: 44px; height: 44px; border-radius: 14px;
      background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-size: 16px;
      flex-shrink: 0; box-shadow: 0 4px 12px rgba(91,79,255,0.3);
    }

    .num-badge-bachelor { background: linear-gradient(135deg, #1d4ed8, #3b82f6); box-shadow: 0 4px 12px rgba(29,78,216,0.3); }
    .num-badge-masters  { background: linear-gradient(135deg, #be185d, #ec4899); box-shadow: 0 4px 12px rgba(190,24,93,0.3); }
    .num-badge-phd      { background: linear-gradient(135deg, #b45309, #f59e0b); box-shadow: 0 4px 12px rgba(180,83,9,0.3); }

    .program-name { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 14px; letter-spacing: -0.01em; }

    .degree-tab {
      flex: 1; padding: 10px 12px; border-radius: 10px; border: 1.5px solid var(--border); background: white;
      font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.25s ease; text-align: center; color: var(--text-2);
    }
    .degree-tab:hover { background: var(--surface-2); }
    .degree-tab.active-bachelor { background: var(--bachelor-bg); border-color: var(--bachelor-border); color: var(--bachelor-accent); }
    .degree-tab.active-masters  { background: var(--masters-bg);  border-color: var(--masters-border);  color: var(--masters-accent); }
    .degree-tab.active-phd      { background: var(--phd-bg);      border-color: var(--phd-border);      color: var(--phd-accent); }

    .rank-growth { font-size: 9.5px; font-weight: 800; font-family: 'Bricolage Grotesque', sans-serif; padding: 1px 5px; border-radius: 5px; display: inline-flex; align-items: center; gap: 1px; flex-shrink: 0; }
    .rank-up   { color: #059669; background: #d1fae5; }
    .rank-down { color: #dc2626; background: #fee2e2; }

    .score-pill { font-size: 9.5px; font-weight: 700; font-family: 'Bricolage Grotesque', sans-serif; padding: 1px 6px; border-radius: 5px; background: #f3f0ff; color: var(--accent); border: 1px solid #d4caff; display: inline-flex; align-items: center; }

    .dev-credit { text-align: center; font-size: 12px; color: var(--text-2); padding: 20px 0 8px; }
    .dev-credit a { color: var(--accent); font-weight: 700; text-decoration: none; transition: color 0.2s ease; }
    .dev-credit a:hover { color: var(--accent-mid); text-decoration: underline; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const parseRank = (rank) => {
      if (!rank || rank.toString().toUpperCase() === 'N/A') return Infinity;
      const match = rank.toString().match(/\d+/);
      return match ? parseInt(match[0], 10) : Infinity;
    };

    const parseRankStart = (rank) => {
      if (!rank || rank.toString().toUpperCase() === 'N/A') return null;
      const s = rank.toString().trim();
      const rangeMatch = s.match(/^(\d+)-(\d+)$/);
      if (rangeMatch) return parseInt(rangeMatch[1], 10);
      const num = parseInt(s, 10);
      return isNaN(num) ? null : num;
    };

    const computeRankGrowth = (currentRank, prevRank) => {
      const cur = parseRankStart(currentRank);
      const prv = parseRankStart(prevRank);
      if (cur === null || prv === null) return null;
      return prv - cur;
    };

    function useDebounce(value, delay) {
      const [dv, setDv] = useState(value);
      useEffect(() => {
        const h = setTimeout(() => setDv(value), delay);
        return () => clearTimeout(h);
      }, [value, delay]);
      return dv;
    }

    const normalizeUnivName = (s) => s.toLowerCase().trim()
      .replace(/[''`]/g, "'")
      .replace(/[^a-z0-9\s']/g, ' ')
      .replace(/\bmadinah\b/g, 'medinah')
      .replace(/\bmedina\b/g, 'medinah')
      .replace(/\bjeddah\b/g, 'jeddah')
      .replace(/\bjidda\b/g, 'jeddah')
      .replace(/\b(university|of|the|and|&)\b/g, ' ')
      .replace(/\s+/g, ' ').trim();

    const lookupRank = (qsDb, univName) => {
      if (!qsDb || !univName) return null;
      const q = univName.toLowerCase().trim();
      const qNorm = normalizeUnivName(univName);

      if (qsDb[q]) return qsDb[q];
      for (const [key, entry] of Object.entries(qsDb)) {
        if (normalizeUnivName(key) === qNorm) return entry;
      }
      for (const [key, entry] of Object.entries(qsDb)) {
        const shorter = q.length < key.length ? q : key;
        const longer  = q.length < key.length ? key : q;
        const ratio   = shorter.length / longer.length;
        if (ratio >= 0.7 && longer.includes(shorter)) return entry;
      }
      for (const [key, entry] of Object.entries(qsDb)) {
        const kNorm   = normalizeUnivName(key);
        const shorter = qNorm.length < kNorm.length ? qNorm : kNorm;
        const longer  = qNorm.length < kNorm.length ? kNorm : qNorm;
        const ratio   = shorter.length / longer.length;
        if (ratio >= 0.7 && longer.includes(shorter)) return entry;
      }
      const qWords = qNorm.split(' ').filter(w => w.length > 2);
      if (qWords.length > 0) {
        let bestKey = null, bestScore = 0;
        for (const [key, entry] of Object.entries(qsDb)) {
          const kWords = normalizeUnivName(key).split(' ').filter(w => w.length > 2);
          const matches = qWords.filter(w => kWords.includes(w)).length;
          const score = matches / Math.max(qWords.length, kWords.length);
          if (score > bestScore && score >= 0.75) { bestScore = score; bestKey = key; }
        }
        if (bestKey) return qsDb[bestKey];
      }
      return null;
    };

    const DURATION_OPTIONS = {
      'Bachelor':  ['3 Years', '4 Years', '5 Years', '6 Years', '7 Years', 'Custom'],
      "Master's":  ['1 Year', '2 Years', '3 Years', 'Custom'],
      'PhD':       ['1 Year','2 Years','3 Years','4 Years','5 Years','6 Years','7 Years','8 Years','9 Years', 'Custom'],
    };

    const DEFAULT_DURATION = {
      'Bachelor':  '4 Years',
      "Master's":  '2 Years',
      'PhD':       '3 Years',
    };

    const genFileId = () => {
      const now = new Date();
      const pad = n => String(n).padStart(2,'0');
      return `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${Date.now().toString(36).toUpperCase()}`;
    };

    const parseQSXlsx = (arrayBuffer) => {
      const wb = XLSX.read(arrayBuffer, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      if (rows.length < 3) return {};

      let headerRowIdx = 2;
      for (let i = 0; i < Math.min(6, rows.length); i++) {
        const cells = rows[i].map(c => String(c).toLowerCase().trim());
        if (cells.some(c => c === 'name' || c === 'rank')) { headerRowIdx = i; break; }
      }

      const header = rows[headerRowIdx].map(c => String(c).toLowerCase().trim());

      let nameIdx    = header.findIndex(c => c === 'name');
      if (nameIdx === -1) nameIdx = header.findIndex(c => c.includes('name') || c.includes('institution'));
      if (nameIdx === -1) nameIdx = 3;

      let rankIdx    = header.findIndex(c => c === 'rank');
      if (rankIdx === -1) rankIdx = header.findIndex(c => c.includes('rank') && !c.includes('previous') && !c.includes('prev'));
      if (rankIdx === -1) rankIdx = 1;

      let prevRankIdx = header.findIndex(c => c.includes('previous') || c.includes('prev rank'));
      if (prevRankIdx === -1) prevRankIdx = 2;

      let countryIdx = header.findIndex(c => c === 'country/territory' || c === 'country');
      if (countryIdx === -1) countryIdx = header.findIndex(c => c.includes('country') || c === 'location');
      if (countryIdx === -1) countryIdx = 4;

      let cityIdx = header.findIndex(c => c === 'city');
      if (cityIdx === -1) cityIdx = 5;

      let overallIdx = header.findIndex(c => c.includes('overall'));
      if (overallIdx === -1) overallIdx = header.length - 1;

      const db = {};
      for (let i = headerRowIdx + 1; i < rows.length; i++) {
        const row = rows[i];
        const rawName    = String(row[nameIdx]    || '').trim();
        const rawRank    = String(row[rankIdx]    || '').trim();
        const rawPrev    = String(row[prevRankIdx]|| '').trim();
        const rawCountry = String(row[countryIdx] || '').trim();
        const rawCity    = String(row[cityIdx]    || '').trim();
        const rawScore   = String(row[overallIdx] || '').trim();
        if (!rawName || rawName.toLowerCase() === 'name') continue;
        if (rawName.length < 3) continue;
        db[rawName.toLowerCase()] = {
          originalName: rawName,
          rank: rawRank || 'N/A',
          prevRank: rawPrev || '',
          country: rawCountry,
          city: rawCity,
          overallScore: rawScore,
        };
      }
      return db;
    };

    const App = () => {
      const [preferences, setPreferences] = useState(() => {
        try {
          const saved = localStorage.getItem('programsTrackerV1');
          return saved ? JSON.parse(saved) : [];
        } catch {
          localStorage.removeItem('programsTrackerV1');
          return [];
        }
      });

      const [qsDb, setQsDb] = useState(null);
      const [qsDbMeta, setQsDbMeta] = useState(null);
      const [qsLoading, setQsLoading] = useState(true);
      const [qsError, setQsError] = useState(false);

      const defaultForm = {
        degreeType: 'Bachelor',
        universityName: '',
        qsRanking: '',
        cityState: '',
        country: '',
        programName: '',
        duration: '4 Years',
        customDuration: '',
        language: 'English',
        customLanguage: '',
        logoUrl: '',
        gender: 'Both'
      };

      const [formData, setFormData] = useState(defaultForm);
      const [editingId, setEditingId] = useState(null);
      const [editFormData, setEditFormData] = useState({});
      const [showSyncModal, setShowSyncModal] = useState(false);
      const [itemToDelete, setItemToDelete] = useState(null); 
      const [showClearAllModal, setShowClearAllModal] = useState(false); // Modal state for clear all
      const [syncLink, setSyncLink] = useState('');
      const [toast, setToast] = useState(null);
      const [suggestions, setSuggestions] = useState([]);
      const [showSuggestions, setShowSuggestions] = useState(false);

      const suggestionRef  = useRef(null);
      const fileInputRef   = useRef(null);
      const qsFileInputRef = useRef(null);
      const debouncedSearch = useDebounce(formData.universityName, 500);

      const fetchCityForUniversity = async (univName, country) => {
        try {
          const sparql = `
            SELECT ?cityLabel WHERE {
              ?univ wdt:P31/wdt:P279* wd:Q3918 .
              ?univ rdfs:label "${univName.replace(/"/g, '\\"')}"@en .
              ?univ wdt:P131 ?city .
              SERVICE wikibase:label { bd:serviceParam wikibase:language "en". }
            } LIMIT 1
          `;
          const url = `https://query.wikidata.org/sparql?query=${encodeURIComponent(sparql)}&format=json`;
          const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
          if (!res.ok) return;
          const data = await res.json();
          const city = data?.results?.bindings?.[0]?.cityLabel?.value;
          if (city && !city.startsWith('Q')) {
            setFormData(prev => ({ ...prev, cityState: city }));
          }
        } catch {}
      };

      const handleManualQSImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const db = parseQSXlsx(evt.target.result);
            const count = Object.keys(db).length;
            if (count === 0) { showToast('❌ No universities found in file.', 'error'); return; }
            setQsDb(db);
            setQsDbMeta({ count, loadedAt: new Date().toLocaleDateString() });
            setQsError(false);
            showToast(`✅ Loaded ${count} universities from file.`);
          } catch {
            showToast('❌ Failed to parse QS file.', 'error');
          }
        };
        reader.readAsArrayBuffer(file);
        e.target.value = null;
      };

      useEffect(() => {
        localStorage.setItem('programsTrackerV1', JSON.stringify(preferences));
      }, [preferences]);

      useEffect(() => {
        const params   = new URLSearchParams(window.location.search);
        const syncData = params.get('s');
        if (syncData) {
          try {
            const decoded = JSON.parse(LZString.decompressFromEncodedURIComponent(syncData));
            if (Array.isArray(decoded)) {
              setPreferences(decoded);
              showToast('✅ Data restored from Cloud Link!');
              window.history.replaceState(null, '', window.location.pathname);
            }
          } catch {
            showToast('❌ Invalid or corrupted sync link.', 'error');
          }
        }
      }, []);

      useEffect(() => {
        const handler = (e) => {
          if (suggestionRef.current && !suggestionRef.current.contains(e.target))
            setShowSuggestions(false);
        };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      useEffect(() => {
        if (!debouncedSearch || debouncedSearch.length <= 1 || !showSuggestions) {
          setSuggestions([]); return;
        }
        if (!qsDb) { setSuggestions([]); return; }

        const term = debouncedSearch.toLowerCase().trim();
        const results = [];
        for (const [key, entry] of Object.entries(qsDb)) {
          if (key.includes(term)) {
            results.push({
              name: entry.originalName || key,
              _qsKey: key,
              _qsRank: entry.rank || '',
              _qsPrevRank: entry.prevRank || '',
              _qsCountry: entry.country || '',
              _qsCity: entry.city || '',
              _qsOverall: entry.overallScore || '',
            });
            if (results.length >= 8) break;
          }
        }
        setSuggestions(results);
      }, [debouncedSearch, showSuggestions, qsDb]);

      const QS_PATH = '/data/qsdata.xlsx';
      const CORS_PROXIES = [
        (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
        (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
        (url) => `https://cors-anywhere.herokuapp.com/${url}`,
      ];

      useEffect(() => {
        setQsLoading(true);
        setQsError(false);
        const tryFetch = async (url) => {
          const r = await fetch(url);
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.arrayBuffer();
        };
        const loadQS = async () => {
          const urls = [QS_PATH, ...CORS_PROXIES.map(p => p(QS_PATH))];
          let lastErr = null;
          for (const url of urls) {
            try {
              const buf = await tryFetch(url);
              const db  = parseQSXlsx(buf);
              const count = Object.keys(db).length;
              if (count === 0) throw new Error('Empty DB');
              setQsDb(db);
              setQsDbMeta({ count, loadedAt: new Date().toLocaleDateString() });
              setQsError(false);
              return;
            } catch (e) { lastErr = e; }
          }
          console.error('QS load failed:', lastErr);
          setQsError(true);
        };
        loadQS().finally(() => setQsLoading(false));
      }, []);

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 4000);
      };

      const sortByRank = (list) =>
        [...list].sort((a, b) => parseRank(a.qsRanking) - parseRank(b.qsRanking));

      const handleAddInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
        if (name === 'universityName') setShowSuggestions(true);
      };

      const handleDegreeChange = (deg) => {
        setFormData(prev => ({
          ...prev,
          degreeType: deg,
          duration: DEFAULT_DURATION[deg] || '4 Years',
          customDuration: '',
        }));
      };

      const selectSuggestion = (univ) => {
        const rank    = univ._qsRank    || '';
        const country = univ._qsCountry || '';
        const city    = univ._qsCity    || '';
        setFormData(prev => ({
          ...prev,
          universityName: univ.name,
          qsRanking:      rank,
          country:        country,
          cityState:      city,
        }));
        setShowSuggestions(false);
        if (!city && univ.name) fetchCityForUniversity(univ.name, country);
        if (rank && rank !== 'N/A') {
          showToast(`✅ QS Rank found: ${rank}`);
        } else {
          showToast('Rank not found in QS database. You can enter it manually.', 'warn');
        }
      };

      const getFinalDuration = (data) => {
        if (data.duration === 'Custom') {
          if (data.customDuration && data.customDuration.trim()) {
            const cd = data.customDuration.trim();
            return cd.includes('Year') || cd.includes('year') ? cd : `${cd} Years`;
          }
          return '';
        }
        return data.duration;
      };

      const handleAddProgram = (e) => {
        e.preventDefault();
        if (!formData.universityName || !formData.programName) return;

        const finalLang = formData.language === 'Others'
          ? (formData.customLanguage || 'Not Specified')
          : formData.language;

        let overallScore = '';
        let prevRank = '';
        if (qsDb) {
          const entry = lookupRank(qsDb, formData.universityName);
          if (entry && typeof entry === 'object') {
            overallScore = entry.overallScore || '';
            prevRank = entry.prevRank || '';
          }
        }

        const newPref = {
          id:             Date.now().toString(),
          degreeType:     formData.degreeType,
          universityName: formData.universityName,
          qsRanking:      formData.qsRanking || 'N/A',
          prevRank:       prevRank,
          overallScore:   overallScore,
          cityState:      formData.cityState,
          country:        formData.country,
          programName:    formData.programName,
          duration:       getFinalDuration(formData),
          language:       finalLang,
          logoUrl:        formData.logoUrl,
          gender:         formData.gender || 'Both'
        };

        setPreferences(sortByRank([...preferences, newPref]));
        setFormData(prev => ({ ...prev, programName: '', customDuration: '', duration: DEFAULT_DURATION[prev.degreeType] || '4 Years' }));
        showToast('✅ Program added!');
      };

      const clearUniversityFields = () => {
        setFormData(prev => ({ ...prev, universityName: '', qsRanking: '', cityState: '', country: '', logoUrl: '' }));
        setSuggestions([]);
      };

      const STANDARD_LANGS = ['English', 'Arabic', 'Bilingual (Ar+En)'];

      const startEditing = (pref) => {
        setEditingId(pref.id);
        const isStdLang = STANDARD_LANGS.includes(pref.language);
        const currentOptions = DURATION_OPTIONS[pref.degreeType] || DURATION_OPTIONS['Bachelor'];
        const isStdDur = currentOptions.includes(pref.duration);

        setEditFormData({
          ...pref,
          language:       isStdLang ? pref.language : 'Others',
          customLanguage: isStdLang ? '' : pref.language,
          duration:       isStdDur ? pref.duration : 'Custom',
          customDuration: isStdDur ? '' : pref.duration,
        });
      };

      const saveEdit = () => {
        const finalLang = editFormData.language === 'Others'
          ? (editFormData.customLanguage || 'Not Specified')
          : editFormData.language;
        const finalDuration = getFinalDuration(editFormData);
        const updated = preferences.map(p =>
          p.id === editingId ? { ...editFormData, language: finalLang, duration: finalDuration, gender: editFormData.gender || 'Both' } : p
        );
        setPreferences(sortByRank(updated));
        setEditingId(null);
        showToast('Changes saved successfully.');
      };

      const confirmDelete = () => {
        if(itemToDelete) {
          setPreferences(preferences.filter(p => p.id !== itemToDelete));
          setItemToDelete(null);
          showToast('Program removed.');
        }
      };

      const movePreference = (index, direction) => {
        const arr = [...preferences];
        if (direction === 'up' && index > 0)
          [arr[index - 1], arr[index]] = [arr[index], arr[index - 1]];
        else if (direction === 'down' && index < arr.length - 1)
          [arr[index + 1], arr[index]] = [arr[index], arr[index + 1]];
        setPreferences(arr);
      };

      const handleSortClick = () => {
        setPreferences(sortByRank(preferences));
        showToast('List sorted by QS Ranking.');
      };

      const [isShortening, setIsShortening] = useState(false);

      const generateCloudLink = async () => {
        const compressed = LZString.compressToEncodedURIComponent(JSON.stringify(preferences));
        const longUrl = `${window.location.origin}${window.location.pathname}?s=${compressed}`;
        setSyncLink('');
        setIsShortening(true);
        try {
          const res = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(longUrl)}`);
          if (!res.ok) throw new Error('TinyURL failed');
          const short = await res.text();
          setSyncLink(short.trim());
        } catch {
          setSyncLink(longUrl);
          showToast('Could not shorten link, showing full URL.', 'warn');
        } finally {
          setIsShortening(false);
        }
      };

      const handleExportCSV = () => {
        const headers = ['Rank','Degree','University Name','QS World Ranking','City/State','Country','Program Name','Duration','Language','Gender'];
        const rows = preferences.map((p, i) => [
          i + 1, p.degreeType,
          `"${p.universityName.replace(/"/g,'""')}"`,
          p.qsRanking,
          `"${(p.cityState || '').replace(/"/g,'""')}"`,
          `"${(p.country || '').replace(/"/g,'""')}"`,
          `"${p.programName.replace(/"/g,'""')}"`,
          p.duration, p.language,
          p.gender || 'Both'
        ].join(','));
        const csv  = '\uFEFF' + [headers.join(','), ...rows].join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `ProgramsTracker_${genFileId()}.csv`;
        link.click();
      };

      // HTML2PDF integration for Direct Export PDF
      const handleExportPDF = () => {
        if(preferences.length === 0) {
          showToast('Your list is empty. Add programs first.', 'warn');
          return;
        }
        
        const element = document.getElementById('pdf-export-area');
        element.classList.add('is-exporting-pdf');
        
        const opt = {
          margin:       0.4,
          filename:     `ProgramsTracker_${genFileId()}.pdf`,
          image:        { type: 'jpeg', quality: 0.98 },
          html2canvas:  { scale: 2, useCORS: true },
          jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
        };
        
        showToast('Generating PDF...', 'success');
        
        html2pdf().set(opt).from(element).save().then(() => {
          element.classList.remove('is-exporting-pdf');
        }).catch(err => {
          element.classList.remove('is-exporting-pdf');
          showToast('Error generating PDF.', 'error');
        });
      };

      const parseImportedRows = (rows) => {
        const imported = [];
        for (let i = 1; i < rows.length; i++) {
          const row = rows[i];
          if (!row || row.length < 7) continue;
          const c = (s) => s != null ? String(s).replace(/^"|"$/g, '').trim() : '';
          imported.push({
            id:             Date.now().toString() + i,
            degreeType:     c(row[1]) || 'Bachelor',
            universityName: c(row[2]) || '',
            qsRanking:      c(row[3]) || 'N/A',
            cityState:      c(row[4]) || '',
            country:        c(row[5]) || '',
            programName:    c(row[6]) || '',
            duration:       c(row[7]) || '',
            language:       c(row[8]) || '',
            gender:         c(row[9]) || 'Both',
            logoUrl:        '',
            prevRank:       '',
            overallScore:   '',
          });
        }
        return imported;
      };

      const handleImportCSV = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const isXlsx = file.name.endsWith('.xlsx') || file.name.endsWith('.xls');
        const reader = new FileReader();
        reader.onload = (evt) => {
          let rows;
          if (isXlsx) {
            const wb = XLSX.read(evt.target.result, { type: 'array' });
            const ws = wb.Sheets[wb.SheetNames[0]];
            rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
          } else {
            const lines = evt.target.result.split('\n').filter(l => l.trim());
            if (lines.length < 2) return showToast('Invalid or empty file.', 'error');
            rows = lines.map(line => line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
          }
          if (!rows || rows.length < 2) return showToast('File is empty or invalid.', 'error');
          const imported = parseImportedRows(rows);
          if (!imported.length) return showToast('No valid rows found in file.', 'error');
          setPreferences(sortByRank([...preferences, ...imported]));
          showToast(`✅ ${imported.length} programs imported!`);
          e.target.value = null;
        };
        if (isXlsx) reader.readAsArrayBuffer(file);
        else reader.readAsText(file);
      };

      const RankGrowth = ({ current, previous }) => {
        const diff = computeRankGrowth(current, previous);
        if (diff === null || diff === 0) return null;
        if (diff > 0) return <span className="rank-growth rank-up">▲{diff}</span>;
        return <span className="rank-growth rank-down">▼{Math.abs(diff)}</span>;
      };

      const degreeCardClass = (deg) => {
        if (deg === 'Bachelor') return 'card-bachelor';
        if (deg === "Master's") return 'card-masters';
        if (deg === 'PhD') return 'card-phd';
        return '';
      };

      const degreeBadgeNumClass = (deg) => {
        if (deg === 'Bachelor') return 'num-badge-bachelor';
        if (deg === "Master's") return 'num-badge-masters';
        if (deg === 'PhD') return 'num-badge-phd';
        return '';
      };

      const getActiveTabClass = (deg) => {
        if (deg === 'Bachelor') return 'active-bachelor';
        if (deg === "Master's") return 'active-masters';
        if (deg === 'PhD') return 'active-phd';
        return '';
      };

      const isValidScore = (s) => {
        if (!s) return false;
        const trimmed = s.toString().trim();
        return trimmed !== '' && trimmed !== '−' && trimmed !== '-' && trimmed !== 'N/A';
      };

      const toastColors = {
        success: { bg: '#1a1730', border: '#2d2550', text: 'white' },
        error:   { bg: '#fef2f2', border: '#fecaca', text: '#dc2626' },
        warn:    { bg: '#fffbeb', border: '#fde68a', text: '#92400e' }
      };
      const tc = toastColors[toast?.type] || toastColors.success;

      return (
        <div style={{ minHeight: '100vh', paddingBottom: '80px' }}>
          
          {toast && (
            <div className="toast-enter" style={{
              position: 'fixed', top: '20px', left: '50%', transform: 'translateX(-50%)',
              zIndex: 9999, padding: '12px 20px', borderRadius: '14px',
              background: tc.bg, border: `1px solid ${tc.border}`, color: tc.text,
              fontWeight: 600, fontSize: '13.5px', display: 'flex', alignItems: 'center',
              gap: '8px', boxShadow: '0 8px 32px rgba(0,0,0,0.18)', whiteSpace: 'nowrap',
              maxWidth: '90vw', overflow: 'hidden', textOverflow: 'ellipsis'
            }}>
              {toast.message}
            </div>
          )}

          <header className="glass print-hidden" style={{
            borderBottom: '1px solid rgba(91,79,255,0.1)',
            position: 'sticky', top: 0, zIndex: 40,
            boxShadow: '0 2px 20px rgba(91,79,255,0.06)'
          }}>
            <div style={{ maxWidth: '760px', margin: '0 auto', padding: '14px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                <div style={{
                  width: 38, height: 38, borderRadius: '12px',
                  background: 'linear-gradient(135deg, #5b4fff, #8b7fff)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  boxShadow: '0 4px 12px rgba(91,79,255,0.35)'
                }}>
                  <svg width="18" height="18" fill="none" stroke="white" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 14l9-5-9-5-9 5 9 5z"/>
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/>
                  </svg>
                </div>
                <span style={{ fontFamily: 'Bricolage Grotesque', fontWeight: 800, fontSize: '20px', color: 'var(--text)' }}>
                  Programs<span style={{ color: 'var(--accent)' }}>Tracker</span>
                </span>
              </div>
              <button onClick={() => { setShowSyncModal(true); generateCloudLink(); }} className="btn-ghost" style={{ fontSize: '12.5px' }}>
                <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
                </svg>
                Short Link
              </button>
            </div>
          </header>

          <main style={{ maxWidth: '760px', margin: '0 auto', padding: '28px 16px' }}>

            <div className="print-hidden" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '20px', flexWrap: 'wrap', gap: '10px' }}>
              <div>
                <h2 style={{ fontFamily: 'Bricolage Grotesque', fontWeight: 800, fontSize: '22px', color: 'var(--text)', margin: 0 }}>
                  Application Dashboard
                </h2>
                <p style={{ color: 'var(--text-2)', fontSize: '13px', marginTop: '3px' }}>
                  QS rankings · City & country auto-fill · Cloud sync
                </p>
              </div>
              <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap', alignItems: 'center' }}>
                <input type="file" id="csv-file-input" accept=".csv,.xlsx,.xls" ref={fileInputRef} onChange={handleImportCSV} style={{ display: 'none' }} />
                <label htmlFor="csv-file-input" className="btn-ghost" style={{ cursor: 'pointer' }}>
                  <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                  </svg>
                  Import CSV
                </label>
                <button onClick={handleExportCSV} className="btn-green">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="-343.4625 -532.5 2976.675 3195" width="20" height="20">
                   <path d="M1437.75 1011.75L532.5 852v1180.393c0 53.907 43.7 97.607 97.607 97.607h1562.036c53.907 0 97.607-43.7 97.607-97.607V1597.5z" fill="#185C37" />
                   <path d="M1437.75 0H630.107C576.2 0 532.5 43.7 532.5 97.607V532.5l905.25 532.5L1917 1224.75 2289.75 1065V532.5z" fill="#21A366" />
                   <path d="M532.5 532.5h905.25V1065H532.5z" fill="#107C41" />
                   <path d="M1180.393 426H532.5v1331.25h647.893c53.834-.175 97.432-43.773 97.607-97.607V523.607c-.175-53.834-43.773-97.432-97.607-97.607z" opacity=".1" />
                   <path d="M1127.143 479.25H532.5V1810.5h594.643c53.834-.175 97.432-43.773 97.607-97.607V576.857c-.175-53.834-43.773-97.432-97.607-97.607z" opacity=".2" />
                   <path d="M1127.143 479.25H532.5V1704h594.643c53.834-.175 97.432-43.773 97.607-97.607V576.857c-.175-53.834-43.773-97.432-97.607-97.607z" opacity=".2" />
                   <path d="M1073.893 479.25H532.5V1704h541.393c53.834-.175 97.432-43.773 97.607-97.607V576.857c-.175-53.834-43.773-97.432-97.607-97.607z" opacity=".2" />
                   <linearGradient id="a" gradientTransform="matrix(1 0 0 -1 0 2132)" y2="404.982" x2="967.987" y1="1729.018" x1="203.513" gradientUnits="userSpaceOnUse">
                     <stop offset="0" stop-color="#18884f" />
                     <stop offset=".5" stop-color="#117e43" />
                     <stop offset="1" stop-color="#0b6631" />
                   </linearGradient>
                   <path d="M97.607 479.25h976.285c53.907 0 97.607 43.7 97.607 97.607v976.285c0 53.907-43.7 97.607-97.607 97.607H97.607C43.7 1650.75 0 1607.05 0 1553.143V576.857c0-53.907 43.7-97.607 97.607-97.607z" fill="url(#a)" />
                   <path d="M302.3 1382.264l205.332-318.169L319.5 747.683h151.336l102.666 202.35c9.479 19.223 15.975 33.494 19.49 42.919h1.331a798.667 798.667 0 0121.3-44.677L725.371 747.79H864.3l-192.925 314.548L869.2 1382.263H721.378L602.79 1160.158a186.298 186.298 0 01-14.164-29.66h-1.757a140.458 140.458 0 01-13.739 28.755l-122.102 223.011z" fill="#FFF" />
                   <path d="M2192.143 0H1437.75v532.5h852V97.607C2289.75 43.7 2246.05 0 2192.143 0z" fill="#33C481" />
                   <path d="M1437.75 1065h852v532.5h-852z" fill="#107C41" />
                  </svg>
                  Export CSV
                </button>
                <button onClick={handleExportPDF} className="btn-red">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="20" height="20" fill="currentColor">
                   <path d="M325,105H250a5,5,0,0,1-5-5V25a5,5,0,0,1,10,0V95h70a5,5,0,0,1,0,10Z" />

                                </button>
                                <button className="icon-btn" onClick={() => movePreference(index, 'down')} disabled={index === preferences.length - 1} title="Move Down">
                                  <svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 9l-7 7-7-7"/>
                                  </svg>
                                </button>
                              </div>
                              <button className="icon-btn" onClick={() => startEditing(pref)} title="Edit">
                                <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                </svg>
                              </button>
                              <button className="icon-btn danger" onClick={() => setItemToDelete(pref.id)} title="Delete">
                                <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                </svg>
                              </button>
                            </div>
                          </div>
                        </div>
                      ) : (
                        <div style={{ flex: 1 }} className="fade-slide-enter">
                          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px', marginBottom: '12px' }}>
                            <input type="text" value={editFormData.universityName}
                              onChange={e => setEditFormData({...editFormData, universityName: e.target.value})}
                              className="input-field" style={{ gridColumn: '1/-1' }} placeholder="University Name"/>
                            <input type="text" value={editFormData.programName}
                              onChange={e => setEditFormData({...editFormData, programName: e.target.value})}
                              className="input-field" style={{ gridColumn: '1/-1' }} placeholder="Program Title"/>
                            <select value={editFormData.degreeType}
                              onChange={e => setEditFormData({...editFormData, degreeType: e.target.value, duration: DEFAULT_DURATION[e.target.value] || '4 Years'})}
                              className="input-field">
                              <option>Bachelor</option><option>Master's</option><option>PhD</option>
                            </select>
                            <input type="text" value={editFormData.qsRanking}
                              onChange={e => setEditFormData({...editFormData, qsRanking: e.target.value})}
                              className="input-field" placeholder="QS Rank"/>
                            <input type="text" value={editFormData.cityState}
                              onChange={e => setEditFormData({...editFormData, cityState: e.target.value})}
                              className="input-field" placeholder="City/State"/>
                            <input type="text" value={editFormData.country}
                              onChange={e => setEditFormData({...editFormData, country: e.target.value})}
                              className="input-field" placeholder="Country"/>
                            <select value={editFormData.duration}
                              onChange={e => setEditFormData({...editFormData, duration: e.target.value})}
                              className="input-field">
                              {(DURATION_OPTIONS[editFormData.degreeType] || DURATION_OPTIONS['Bachelor']).map(y => (
                                <option key={y} value={y}>{y}</option>
                              ))}
                            </select>
                            
                            {editFormData.duration === 'Custom' && (
                              <input type="text" value={editFormData.customDuration || ''}
                                onChange={e => setEditFormData({...editFormData, customDuration: e.target.value})}
                                className="input-field" placeholder="Custom duration (e.g. 4.5 Years)"/>
                            )}

                            <select value={editFormData.language}
                              onChange={e => setEditFormData({...editFormData, language: e.target.value})}
                              className="input-field">
                              <option>English</option><option>Arabic</option>
                              <option>Bilingual (Ar+En)</option>
                              <option value="Others">Others…</option>
                            </select>
                            <select value={editFormData.gender || 'Both'}
                              onChange={e => setEditFormData({...editFormData, gender: e.target.value})}
                              className="input-field">
                              <option value="Both">Both</option>
                              <option value="Male">Male</option>
                              <option value="Female">Female</option>
                            </select>
                            {editFormData.language === 'Others' && (
                              <input type="text" value={editFormData.customLanguage || ''}
                                onChange={e => setEditFormData({...editFormData, customLanguage: e.target.value})}
                                className="input-field" style={{ gridColumn: '1/-1' }} placeholder="Specify language…"/>
                            )}
                          </div>
                          <div style={{ display: 'flex', justifyContent: 'flex-end', gap: '8px' }}>
                            <button onClick={() => setEditingId(null)} className="btn-ghost">Cancel</button>
                            <button onClick={saveEdit} className="btn-primary" style={{ padding: '10px 20px', fontSize: '13px' }}>Save</button>
                          </div>
                        </div>
                      )}
                    </div>
                  ))
                )}
              </div>
            </div>

            <div className="dev-credit print-hidden">
              ProgramsTracker · Developed by{' '}
              <a href="https://linkedin.com/in/RahatAhmedX" target="_blank" rel="noopener noreferrer">RAHAT</a>
            </div>

          </main>

          {/* cloud sync modal */}
          {showSyncModal && (
            <div className="modal-overlay">
              <div className="modal-content">
                <button
                  onClick={() => setShowSyncModal(false)}
                  style={{
                    position: 'absolute', top: '16px', right: '16px',
                    width: 32, height: 32, borderRadius: '10px',
                    border: '1px solid var(--border)', background: 'white',
                    cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
                    color: 'var(--text-2)'
                  }}>
                  <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M6 18L18 6M6 6l12 12"/>
                  </svg>
                </button>
                <h3 style={{ fontFamily: 'Bricolage Grotesque', fontWeight: 800, fontSize: '20px', marginBottom: '6px', color: 'var(--text)' }}>
                  Cloud Sync Link
                </h3>
                <p style={{ fontSize: '12.5px', color: 'var(--text-2)', marginBottom: '16px' }}>
                  Share this link to restore your list on any device.
                </p>
                <div style={{
                  background: 'var(--surface-2)', padding: '16px', borderRadius: '14px',
                  border: '1.5px solid var(--border)', marginBottom: '16px',
                  display: 'flex', alignItems: 'center', gap: '10px', minHeight: '56px'
                }}>
                  {isShortening ? (
                    <>
                      <div className="spinner"></div>
                      <span style={{ fontSize: '13px', color: 'var(--text-2)' }}>Shortening link…</span>
                    </>
                  ) : (
                    <span style={{ color: 'var(--accent)', fontWeight: 700, fontSize: '15px', wordBreak: 'break-all' }}>
                      {syncLink}
                    </span>
                  )}
                </div>
                <button
                  onClick={() => { navigator.clipboard.writeText(syncLink); showToast('✅ Link copied!'); }}
                  disabled={isShortening || !syncLink}
                  className="btn-primary" style={{ width: '100%', justifyContent: 'center', opacity: (isShortening || !syncLink) ? 0.5 : 1 }}>
                  <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                  </svg>
                  Copy Short Link
                </button>
              </div>
            </div>
          )}

          {/* delete single item modal */}
          {itemToDelete && (
            <div className="modal-overlay">
              <div className="modal-content" style={{ maxWidth: '360px', padding: '24px' }}>
                <div style={{ width: 48, height: 48, borderRadius: '50%', background: '#fef2f2', display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: '16px', color: 'var(--danger)' }}>
                  <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                  </svg>
                </div>
                <h3 style={{ fontFamily: 'Bricolage Grotesque', fontWeight: 800, fontSize: '18px', marginBottom: '8px', color: 'var(--text)' }}>
                  Delete Program?
                </h3>
                <p style={{ fontSize: '13px', color: 'var(--text-2)', marginBottom: '24px', lineHeight: '1.5' }}>
                  Are you sure you want to remove this program from your list? This action cannot be undone.
                </p>
                <div style={{ display: 'flex', gap: '10px' }}>
                  <button onClick={() => setItemToDelete(null)} className="btn-ghost" style={{ flex: 1, justifyContent: 'center' }}>
                    Cancel
                  </button>
                  <button onClick={confirmDelete} className="btn-red" style={{ flex: 1, justifyContent: 'center' }}>
                    Delete
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* clear all items modal */}
          {showClearAllModal && (
            <div className="modal-overlay">
              <div className="modal-content" style={{ maxWidth: '360px', padding: '24px' }}>
                <div style={{ width: 48, height: 48, borderRadius: '50%', background: '#fef2f2', display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: '16px', color: 'var(--danger)' }}>
                  <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                  </svg>
                </div>
                <h3 style={{ fontFamily: 'Bricolage Grotesque', fontWeight: 800, fontSize: '18px', marginBottom: '8px', color: 'var(--text)' }}>
                  Clear All Programs?
                </h3>
                <p style={{ fontSize: '13px', color: 'var(--text-2)', marginBottom: '24px', lineHeight: '1.5' }}>
                  Are you sure you want to delete all programs from your list? This action cannot be undone.
                </p>
                <div style={{ display: 'flex', gap: '10px' }}>
                  <button onClick={() => setShowClearAllModal(false)} className="btn-ghost" style={{ flex: 1, justifyContent: 'center' }}>
                    Cancel
                  </button>
                  <button onClick={() => { setPreferences([]); setShowClearAllModal(false); showToast('All programs cleared.'); }} className="btn-red" style={{ flex: 1, justifyContent: 'center' }}>
                    Clear All
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
