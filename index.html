<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Study Tracker</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    /* Print Styles */
    @media print {
      body { background-color: white !important; }
      .print-hidden { display: none !important; }
      .print-card { box-shadow: none !important; border-bottom: 1px solid #e2e8f0 !important; border-radius: 0 !important; break-inside: avoid; margin-bottom: 20px; padding: 10px 0 !important; }
      .print-bg-transparent { background-color: transparent !important; color: black !important; }
    }
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body class="text-slate-800 antialiased selection:bg-indigo-100 selection:text-indigo-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const App = () => {
      // Load data from LocalStorage (Preserving old data)
      const [preferences, setPreferences] = useState(() => {
        const savedData = localStorage.getItem('universalStudyTracker');
        return savedData ? JSON.parse(savedData) : [];
      });

      const [formData, setFormData] = useState({
        degreeType: 'Bachelor',
        universityName: '',
        qsRanking: '',
        programName: '',
        duration: '4 Years',
        language: 'English',
        customLanguage: '',
      });

      // Editing States
      const [editingId, setEditingId] = useState(null);
      const [editFormData, setEditFormData] = useState({});

      // Sync Modal State
      const [showSyncModal, setShowSyncModal] = useState(false);
      const [syncLink, setSyncLink] = useState('');

      // Auto Save to LocalStorage
      useEffect(() => {
        localStorage.setItem('universalStudyTracker', JSON.stringify(preferences));
      }, [preferences]);

      // Check URL for Sync Data (Cloud Link Import)
      useEffect(() => {
        const urlParams = new URLSearchParams(window.location.search);
        const syncData = urlParams.get('sync');
        if (syncData) {
          try {
            const decoded = JSON.parse(decodeURIComponent(escape(atob(syncData))));
            if (Array.isArray(decoded)) {
              setPreferences(decoded);
              localStorage.setItem('universalStudyTracker', JSON.stringify(decoded));
              alert('✅ Data successfully restored from Cloud Link!');
              // Clean URL
              window.history.replaceState(null, '', window.location.pathname);
            }
          } catch(e) {
            alert('❌ Invalid or broken Sync Link.');
          }
        }
      }, []);

      const getDurationOptions = (degree) => {
        if (degree === 'Bachelor') return ['3 Years', '4 Years', '5 Years', '6 Years', '7 Years'];
        if (degree === "Master's") return ['1 Year', '2 Years'];
        if (degree === 'PhD') return ['3 Years', '4 Years', '5 Years'];
        return ['1 Year', '2 Years', '3 Years', '4 Years', '5 Years', '6 Years', '7 Years'];
      };

      const handleAddInputChange = (e) => {
        setFormData({ ...formData, [e.target.name]: e.target.value });
      };

      const handleAddDegreeChange = (e) => {
        const newDegree = e.target.value;
        const newDurations = getDurationOptions(newDegree);
        setFormData({ ...formData, degreeType: newDegree, duration: newDurations[1] || newDurations[0] });
      };

      const handleAddProgram = (e) => {
        e.preventDefault();
        if (!formData.universityName || !formData.programName) return;
        
        let finalLanguage = formData.language === 'Others' ? (formData.customLanguage || 'Not Specified') : formData.language;

        const newPreference = {
          id: Date.now().toString(),
          degreeType: formData.degreeType,
          universityName: formData.universityName,
          qsRanking: formData.qsRanking,
          programName: formData.programName,
          duration: formData.duration,
          language: finalLanguage
        };

        setPreferences([...preferences, newPreference]);
        setFormData(prev => ({ ...prev, programName: '' }));
      };

      // --- EDIT FUNCTIONS ---
      const startEditing = (pref) => {
        setEditingId(pref.id);
        // Determine if language is standard or custom
        let isStandardLang = ['English', 'Arabic', 'Bilingual (Ar+En)'].includes(pref.language);
        setEditFormData({
          ...pref,
          language: isStandardLang ? pref.language : 'Others',
          customLanguage: isStandardLang ? '' : pref.language
        });
      };

      const handleEditInputChange = (e) => {
        setEditFormData({ ...editFormData, [e.target.name]: e.target.value });
      };

      const handleEditDegreeChange = (e) => {
        const newDegree = e.target.value;
        const newDurations = getDurationOptions(newDegree);
        setEditFormData({ ...editFormData, degreeType: newDegree, duration: newDurations[1] || newDurations[0] });
      };

      const saveEdit = () => {
        if (!editFormData.universityName || !editFormData.programName) return;
        let finalLanguage = editFormData.language === 'Others' ? (editFormData.customLanguage || 'Not Specified') : editFormData.language;

        const updatedPreferences = preferences.map(p => 
          p.id === editingId ? { ...editFormData, language: finalLanguage } : p
        );
        setPreferences(updatedPreferences);
        setEditingId(null);
      };

      // --- ACTION FUNCTIONS ---
      const handleDelete = (id) => {
        if(confirm("Are you sure you want to delete this program?")) {
          setPreferences(preferences.filter(item => item.id !== id));
        }
      };

      const movePreference = (index, direction) => {
        const newPreferences = [...preferences];
        if (direction === 'up' && index > 0) {
          [newPreferences[index - 1], newPreferences[index]] = [newPreferences[index], newPreferences[index - 1]];
        } else if (direction === 'down' && index < newPreferences.length - 1) {
          [newPreferences[index + 1], newPreferences[index]] = [newPreferences[index], newPreferences[index + 1]];
        }
        setPreferences(newPreferences);
      };

      const handlePrintPDF = () => window.print();

      const handleExportCSV = () => {
        const headers = ["Rank", "Degree", "University Name", "QS World Ranking", "Program Name", "Duration", "Language"];
        const csvRows = preferences.map((p, index) => [
          index + 1, p.degreeType, `"${p.universityName.replace(/"/g, '""')}"`, p.qsRanking || "N/A", `"${p.programName.replace(/"/g, '""')}"`, p.duration, p.language
        ].join(","));
        const csvContent = [headers.join(","), ...csvRows].join("\n");
        const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Study_Preferences.csv";
        link.click();
      };

      const generateCloudLink = () => {
        // UTF-8 safe base64 encoding
        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(preferences))));
        const url = `${window.location.origin}${window.location.pathname}?sync=${encoded}`;
        setSyncLink(url);
      };

      const copySyncLink = () => {
        if(syncLink) {
          navigator.clipboard.writeText(syncLink).then(() => {
            alert('Link Copied! Open this link in any other browser (Chrome/Safari) to get your data.');
          }).catch(() => {
            // Fallback for mobile if clipboard API fails
            alert('Please manually copy the link from the text box.');
          });
        }
      };

      return (
        <div className="min-h-screen pb-24">
          
          {/* Top Header / Nav */}
          <header className="bg-white/90 backdrop-blur-md shadow-sm border-b border-slate-200 sticky top-0 z-40 print-hidden">
            <div className="max-w-5xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center">
              <div className="flex items-center gap-3">
                <div className="bg-gradient-to-tr from-indigo-600 to-violet-500 p-2 rounded-xl shadow-lg shadow-indigo-200">
                  <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                </div>
                <h1 className="text-2xl font-extrabold text-slate-800 tracking-tight">Study<span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-violet-500">Track</span></h1>
              </div>
              
              <div className="flex items-center gap-2">
                <button onClick={() => { setShowSyncModal(true); generateCloudLink(); }} className="flex items-center gap-2 bg-blue-50 text-blue-700 hover:bg-blue-100 px-4 py-2.5 rounded-xl font-bold transition-all text-sm border border-blue-200">
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/></svg>
                  Cloud Sync
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-5xl mx-auto px-4 sm:px-6 py-8">
            
            {/* Action Bar */}
            <div className="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4 print-hidden">
              <div>
                <h2 className="text-xl font-bold text-slate-800">My Applications</h2>
                <p className="text-sm text-slate-500 font-medium">Manage and rank your target programs</p>
              </div>
              <div className="flex gap-3 w-full sm:w-auto">
                <button onClick={handleExportCSV} className="flex-1 sm:flex-none flex justify-center items-center gap-2 bg-emerald-50 text-emerald-700 hover:bg-emerald-100 border border-emerald-200 px-4 py-2.5 rounded-xl font-semibold transition-all active:scale-95 text-sm">
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                  Export CSV
                </button>
                <button onClick={handlePrintPDF} className="flex-1 sm:flex-none flex justify-center items-center gap-2 bg-slate-900 text-white hover:bg-slate-800 px-4 py-2.5 rounded-xl font-semibold transition-all active:scale-95 text-sm shadow-md shadow-slate-900/10">
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
                  Save PDF
                </button>
              </div>
            </div>

            {/* Print Header Only */}
            <div className="hidden print:block mb-8 text-center border-b border-slate-200 pb-6">
              <h1 className="text-3xl font-bold text-slate-900">University Preference List</h1>
            </div>

            {/* --- ADD NEW FORM --- */}
            <div className="bg-white p-6 sm:p-8 rounded-3xl shadow-sm border border-slate-200 mb-10 print-hidden">
              <form onSubmit={handleAddProgram} className="grid grid-cols-1 md:grid-cols-12 gap-5">
                
                <div className="md:col-span-12 lg:col-span-3">
                  <label className="block text-sm font-bold text-slate-700 mb-1.5">Degree Level <span className="text-red-500">*</span></label>
                  <select name="degreeType" value={formData.degreeType} onChange={handleAddDegreeChange} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all cursor-pointer font-medium">
                    <option value="Bachelor">Bachelor</option>
                    <option value="Master's">Master's</option>
                    <option value="PhD">PhD</option>
                  </select>
                </div>

                <div className="md:col-span-8 lg:col-span-6">
                  <label className="block text-sm font-bold text-slate-700 mb-1.5">University Name <span className="text-red-500">*</span></label>
                  <input type="text" name="universityName" value={formData.universityName} onChange={handleAddInputChange} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all placeholder:text-slate-400 font-medium" placeholder="e.g. King Saud University" required />
                </div>
                
                <div className="md:col-span-4 lg:col-span-3">
                  <label className="block text-sm font-bold text-slate-700 mb-1.5">QS Rank (Optional)</label>
                  <input type="text" name="qsRanking" value={formData.qsRanking} onChange={handleAddInputChange} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all placeholder:text-slate-400 font-medium" placeholder="e.g. 143 or 730-750" />
                </div>

                <div className="md:col-span-6">
                  <label className="block text-sm font-bold text-slate-700 mb-1.5">Program Name <span className="text-red-500">*</span></label>
                  <input type="text" name="programName" value={formData.programName} onChange={handleAddInputChange} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all placeholder:text-slate-400 font-medium" placeholder="e.g. BSc in Computer Science" required />
                </div>

                <div className="md:col-span-3">
                  <label className="block text-sm font-bold text-slate-700 mb-1.5">Duration</label>
                  <select name="duration" value={formData.duration} onChange={handleAddInputChange} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all cursor-pointer font-medium">
                    {getDurationOptions(formData.degreeType).map(dur => <option key={dur} value={dur}>{dur}</option>)}
                  </select>
                </div>

                <div className={`md:col-span-3 ${formData.language === 'Others' ? 'lg:col-span-1' : 'lg:col-span-3'}`}>
                  <label className="block text-sm font-bold text-slate-700 mb-1.5">Language</label>
                  <select name="language" value={formData.language} onChange={handleAddInputChange} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all cursor-pointer font-medium">
                    <option value="English">English</option>
                    <option value="Others">Others</option>
                  </select>
                </div>

                {formData.language === 'Others' && (
                  <div className="md:col-span-12 lg:col-span-2">
                    <label className="block text-sm font-bold text-slate-700 mb-1.5">Type Lang <span className="text-red-500">*</span></label>
                    <input type="text" name="customLanguage" value={formData.customLanguage} onChange={handleAddInputChange} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all placeholder:text-slate-400 font-medium" placeholder="e.g. Arabic" required />
                  </div>
                )}

                <div className="md:col-span-12 mt-2">
                  <button type="submit" className="w-full bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-md shadow-indigo-200 flex justify-center items-center gap-2 active:scale-[0.98]">
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 4v16m8-8H4"/></svg>
                    Add Program to List
                  </button>
                </div>
              </form>
            </div>

            {/* --- LIST SECTION --- */}
            <div className="space-y-4">
              {preferences.length === 0 ? (
                <div className="text-center py-20 bg-white rounded-3xl border border-dashed border-slate-300 print-hidden">
                  <div className="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg className="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                  </div>
                  <h3 className="text-xl font-bold text-slate-800">No Programs Added</h3>
                  <p className="text-slate-500 mt-2 font-medium">Your preference list is empty.</p>
                </div>
              ) : (
                preferences.map((pref, index) => (
                  <div key={pref.id} className="print-card relative bg-white p-5 sm:p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col sm:flex-row gap-5 items-start sm:items-center hover:border-indigo-300 transition-colors group">
                    
                    {/* Rank Badge */}
                    <div className="absolute -top-3 -left-3 sm:static sm:top-auto sm:left-auto flex-shrink-0 w-10 h-10 sm:w-14 sm:h-14 bg-slate-900 text-white rounded-full sm:rounded-2xl flex items-center justify-center font-extrabold text-lg sm:text-2xl shadow-lg shadow-slate-900/20 print-bg-transparent print:border">
                      #{index + 1}
                    </div>

                    {/* --- VIEW MODE --- */}
                    {editingId !== pref.id ? (
                      <>
                        <div className="flex-grow min-w-0 mt-3 sm:mt-0 w-full">
                          <div className="flex flex-wrap items-center gap-2 mb-2">
                             <h3 className="text-xl font-bold text-slate-800 break-words leading-tight">
                               {pref.universityName}
                             </h3>
                             <span className={`inline-flex items-center gap-1 px-2.5 py-0.5 rounded border text-xs font-bold tracking-wide ${pref.qsRanking ? 'bg-amber-50 text-amber-700 border-amber-200' : 'bg-slate-100 text-slate-500 border-slate-200'}`}>
                               <svg className="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                               QS: {pref.qsRanking || 'N/A'}
                             </span>
                          </div>
                          
                          <div className="flex flex-wrap items-center gap-2 text-indigo-700 font-bold mb-3">
                            <span className="bg-indigo-50 px-2.5 py-0.5 rounded-md text-sm border border-indigo-100">{pref.degreeType}</span>
                            <span className="text-slate-700 font-semibold">in {pref.programName}</span>
                          </div>

                          <div className="flex flex-wrap items-center gap-3 text-sm text-slate-600">
                            <span className="flex items-center gap-1.5 bg-slate-50 border border-slate-100 px-3 py-1.5 rounded-lg font-semibold">
                              <svg className="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                              {pref.duration}
                            </span>
                            <span className="flex items-center gap-1.5 bg-slate-50 border border-slate-100 px-3 py-1.5 rounded-lg font-semibold">
                              <svg className="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/></svg>
                              {pref.language}
                            </span>
                          </div>
                        </div>

                        {/* Actions */}
                        <div className="flex sm:flex-col items-center justify-end gap-2 w-full sm:w-auto mt-4 sm:mt-0 print-hidden pt-4 sm:pt-0">
                          <div className="flex gap-1 bg-slate-50 border border-slate-200 rounded-xl p-1">
                            <button onClick={() => movePreference(index, 'up')} disabled={index === 0} className={`p-1.5 rounded-lg transition-all ${index === 0 ? 'text-slate-300' : 'text-slate-600 hover:bg-white hover:shadow'}`}>
                              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 15l7-7 7 7"/></svg>
                            </button>
                            <button onClick={() => movePreference(index, 'down')} disabled={index === preferences.length - 1} className={`p-1.5 rounded-lg transition-all ${index === preferences.length - 1 ? 'text-slate-300' : 'text-slate-600 hover:bg-white hover:shadow'}`}>
                              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"/></svg>
                            </button>
                          </div>
                          
                          <div className="flex gap-1 ml-auto sm:ml-0">
                            <button onClick={() => startEditing(pref)} className="flex items-center justify-center w-10 h-10 text-indigo-500 hover:bg-indigo-50 rounded-xl transition-all border border-transparent hover:border-indigo-100" title="Edit">
                              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                            </button>
                            <button onClick={() => handleDelete(pref.id)} className="flex items-center justify-center w-10 h-10 text-rose-500 hover:bg-rose-50 rounded-xl transition-all border border-transparent hover:border-rose-100" title="Delete">
                              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                            </button>
                          </div>
                        </div>
                      </>
                    ) : (
                      /* --- EDIT MODE --- */
                      <div className="flex-grow w-full border-2 border-indigo-200 bg-indigo-50/30 p-4 rounded-xl print-hidden">
                        <div className="grid grid-cols-1 md:grid-cols-12 gap-3 mb-3">
                          <div className="md:col-span-3">
                            <label className="text-xs font-bold text-slate-500 uppercase">Degree</label>
                            <select name="degreeType" value={editFormData.degreeType} onChange={handleEditDegreeChange} className="w-full p-2 text-sm border rounded-lg">
                              <option value="Bachelor">Bachelor</option><option value="Master's">Master's</option><option value="PhD">PhD</option>
                            </select>
                          </div>
                          <div className="md:col-span-6">
                            <label className="text-xs font-bold text-slate-500 uppercase">University</label>
                            <input type="text" name="universityName" value={editFormData.universityName} onChange={handleEditInputChange} className="w-full p-2 text-sm border rounded-lg" />
                          </div>
                          <div className="md:col-span-3">
                            <label className="text-xs font-bold text-slate-500 uppercase">QS Rank</label>
                            <input type="text" name="qsRanking" value={editFormData.qsRanking} onChange={handleEditInputChange} placeholder="N/A" className="w-full p-2 text-sm border rounded-lg" />
                          </div>
                          <div className="md:col-span-6">
                            <label className="text-xs font-bold text-slate-500 uppercase">Program</label>
                            <input type="text" name="programName" value={editFormData.programName} onChange={handleEditInputChange} className="w-full p-2 text-sm border rounded-lg" />
                          </div>
                          <div className="md:col-span-3">
                            <label className="text-xs font-bold text-slate-500 uppercase">Duration</label>
                            <select name="duration" value={editFormData.duration} onChange={handleEditInputChange} className="w-full p-2 text-sm border rounded-lg">
                              {getDurationOptions(editFormData.degreeType).map(dur => <option key={dur} value={dur}>{dur}</option>)}
                            </select>
                          </div>
                          <div className="md:col-span-3">
                            <label className="text-xs font-bold text-slate-500 uppercase">Language</label>
                            <select name="language" value={editFormData.language} onChange={handleEditInputChange} className="w-full p-2 text-sm border rounded-lg">
                              <option value="English">English</option><option value="Others">Others</option>
                            </select>
                          </div>
                          {editFormData.language === 'Others' && (
                            <div className="md:col-span-12">
                              <label className="text-xs font-bold text-slate-500 uppercase">Custom Language</label>
                              <input type="text" name="customLanguage" value={editFormData.customLanguage} onChange={handleEditInputChange} className="w-full p-2 text-sm border rounded-lg" />
                            </div>
                          )}
                        </div>
                        <div className="flex gap-2 justify-end">
                          <button onClick={() => setEditingId(null)} className="px-4 py-2 text-sm font-bold text-slate-600 bg-white border rounded-lg hover:bg-slate-50">Cancel</button>
                          <button onClick={saveEdit} className="px-4 py-2 text-sm font-bold text-white bg-indigo-600 rounded-lg hover:bg-indigo-700">Save Changes</button>
                        </div>
                      </div>
                    )}
                  </div>
                ))
              )}
            </div>
          </main>

          {/* Cloud Sync Modal */}
          {showSyncModal && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 print-hidden">
              <div className="bg-white rounded-3xl p-6 sm:p-8 max-w-md w-full shadow-2xl relative">
                <button onClick={() => setShowSyncModal(false)} className="absolute top-4 right-4 text-slate-400 hover:bg-slate-100 p-2 rounded-full">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
                <div className="text-center mb-6">
                  <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/></svg>
                  </div>
                  <h3 className="text-2xl font-bold text-slate-800">Cloud Sync Transfer</h3>
                  <p className="text-slate-500 text-sm mt-2">Browser থেকে ডাউনলোড হচ্ছে না? এই লিংকটি কপি করে অন্য যেকোনো ব্রাউজারে (Chrome/Safari) ওপেন করুন। আপনার সব ডেটা সেখানে চলে যাবে!</p>
                </div>
                
                <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 mb-6 break-all text-xs text-slate-500 max-h-32 overflow-y-auto font-mono">
                  {syncLink}
                </div>

                <button onClick={copySyncLink} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition-all flex justify-center items-center gap-2 mb-3">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
                  Copy Link & Use Anywhere
                </button>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
